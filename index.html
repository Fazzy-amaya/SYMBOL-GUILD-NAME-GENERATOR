<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ᴘʜᴀɴᴛᴏᴍ・〆 — Name Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #12081a, #07020a);
            font-family: 'Segoe UI', 'Arial', sans-serif;
            padding: 20px;
            overflow-y: auto;
            position: relative;
        }

        #birdCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10; /* ABOVE everything */
            pointer-events: none; /* clicks pass through */
        }

        #intro-screen {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #12081a, #07020a);
            padding: 30px;
            transition: opacity 1.2s ease, visibility 1.2s ease;
            opacity: 1;
            visibility: visible;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            overflow-y: auto;
        }

        #intro-screen.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        #intro-text {
            max-width: 750px;
            width: 100%;
            text-align: left;
            font-size: clamp(1.4rem, 4vw, 2.4rem);
            font-weight: 300;
            color: #e4d5ff;
            text-shadow: 0 0 20px #6a2faf;
            line-height: 1.8;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
            z-index: 2;
            position: relative;
        }

        #intro-text .line {
            opacity: 0;
            transform: translateY(8px);
            animation: lineFadeIn 0.3s forwards;
        }

        @keyframes lineFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .cursor-blink {
            display: inline-block;
            width: 3px;
            height: 1.2em;
            background: #9b6dff;
            margin-left: 4px;
            vertical-align: text-bottom;
            animation: blink 0.7s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .intro-credit {
            margin-top: 30px;
            font-size: 1rem;
            color: #6a4a8a;
            letter-spacing: 3px;
            font-family: 'Segoe UI', sans-serif;
            opacity: 0;
            animation: fadeInCredit 1s 0.5s forwards;
            z-index: 2;
            position: relative;
        }

        @keyframes fadeInCredit {
            to { opacity: 1; }
        }

        #click-prompt {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #b396d9;
            letter-spacing: 4px;
            opacity: 0;
            display: none;
            font-family: 'Segoe UI', sans-serif;
            z-index: 2;
            position: relative;
        }

        #click-prompt.show {
            display: block;
            animation: fadeInPrompt 0.8s forwards, pulseGlow 1.5s ease-in-out infinite;
        }

        @keyframes fadeInPrompt {
            to { opacity: 1; }
        }

        @keyframes pulseGlow {
            0%, 100% { text-shadow: 0 0 10px #6a2faf; }
            50% { text-shadow: 0 0 30px #9b6dff, 0 0 60px #4a1a7a; }
        }

        #main-app {
            opacity: 0;
            transition: opacity 1.5s ease;
            width: 100%;
            max-width: 700px;
            pointer-events: none;
            max-height: 90vh;
            overflow-y: auto;
            padding: 5px;
            position: relative;
            z-index: 2; /* lower than canvas, but canvas is pointer-events: none */
        }

        #main-app.visible {
            opacity: 1;
            pointer-events: all;
        }

        .container {
            background: rgba(20, 10, 30, 0.5);
            backdrop-filter: blur(12px) saturate(1.2);
            -webkit-backdrop-filter: blur(12px) saturate(1.2);
            border: 1px solid rgba(180, 130, 255, 0.25);
            border-radius: 40px;
            padding: 50px 40px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 60px rgba(100, 40, 180, 0.2), inset 0 0 30px rgba(150, 100, 220, 0.05);
        }

        .guild-title {
            font-size: clamp(2.8rem, 10vw, 4.5rem);
            font-weight: 400;
            letter-spacing: 4px;
            color: #e4d5ff;
            text-shadow: 0 0 30px #8a4bff, 0 0 60px #4a1a7a;
            margin-bottom: 5px;
            word-break: break-word;
            display: inline-block;
            animation: heartbeat 1.8s ease-in-out infinite;
            transform-origin: center;
            position: relative;
            z-index: 3;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); text-shadow: 0 0 30px #8a4bff, 0 0 60px #4a1a7a; }
            14% { transform: scale(1.04); text-shadow: 0 0 50px #9b6dff, 0 0 100px #6a2faf; }
            28% { transform: scale(1); text-shadow: 0 0 30px #8a4bff, 0 0 60px #4a1a7a; }
            42% { transform: scale(1.03); text-shadow: 0 0 40px #9b6dff, 0 0 80px #6a2faf; }
            70% { transform: scale(1); text-shadow: 0 0 30px #8a4bff, 0 0 60px #4a1a7a; }
            100% { transform: scale(1); text-shadow: 0 0 30px #8a4bff, 0 0 60px #4a1a7a; }
        }

        .sub-title {
            font-size: 1rem;
            color: #b396d9;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 30px;
            border-top: 1px solid rgba(150, 100, 220, 0.2);
            border-bottom: 1px solid rgba(150, 100, 220, 0.2);
            display: inline-block;
            padding: 8px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 30px;
        }

        .result-wrapper {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 30px;
            border: 1px solid rgba(150, 100, 220, 0.2);
            padding: 25px 20px 15px 20px;
            margin-bottom: 15px;
            transition: 0.3s;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .result-wrapper:hover {
            border-color: #9b6dff;
            box-shadow: 0 0 30px rgba(100, 40, 200, 0.2);
        }

        .result-wrapper:active {
            transform: scale(0.98);
        }

        #result {
            font-size: clamp(2.2rem, 7vw, 4rem);
            font-weight: 400;
            color: #f2e9ff;
            text-shadow: 0 0 40px #9b6dff, 0 0 80px #4a1a7a;
            letter-spacing: 2px;
            word-break: break-word;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        #result.placeholder {
            font-size: 1.1rem;
            color: #6a4a8a;
            text-shadow: none;
            letter-spacing: 4px;
            font-weight: 300;
        }

        .copy-hint {
            font-size: 0.75rem;
            color: #7a5a9a;
            letter-spacing: 2px;
            margin-top: 8px;
            pointer-events: none;
        }

        .copy-btn-container {
            margin: 10px 0 20px 0;
        }

        .copy-btn {
            background: rgba(100, 40, 180, 0.25);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(150, 100, 220, 0.3);
            color: #c4a8f0;
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 2px;
            display: inline-block;
            -webkit-tap-highlight-color: transparent;
        }

        .copy-btn:hover {
            background: rgba(100, 40, 180, 0.4);
            border-color: #9b6dff;
            box-shadow: 0 0 20px rgba(100, 40, 200, 0.2);
        }

        .copy-btn:active {
            transform: scale(0.95);
        }

        .input-area label {
            display: block;
            font-size: 0.9rem;
            color: #c4a8f0;
            letter-spacing: 3px;
            margin-bottom: 12px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .input-area input {
            width: 100%;
            padding: 18px 25px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(150, 100, 220, 0.3);
            border-radius: 60px;
            font-size: 1.2rem;
            color: #f0eaff;
            text-align: center;
            letter-spacing: 2px;
            outline: none;
            transition: 0.3s;
            font-weight: 300;
        }

        .input-area input::placeholder {
            color: #6a4a8a;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        .input-area input:focus {
            border-color: #9b6dff;
            box-shadow: 0 0 25px rgba(120, 60, 220, 0.3);
            background: rgba(10, 5, 20, 0.6);
        }

        .btn {
            margin-top: 15px;
            padding: 16px 55px;
            background: linear-gradient(135deg, #6c2bb3, #3b1470);
            border: none;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 6px;
            color: #f5ecff;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 30px rgba(100, 40, 200, 0.3);
            text-transform: uppercase;
        }

        .btn:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #8235d9, #4f1d8a);
            box-shadow: 0 0 50px rgba(130, 50, 220, 0.6);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .footer-note {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #3f2a5a;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @media (max-width: 480px) {
            .container { padding: 30px 20px; }
            .btn { padding: 14px 30px; font-size: 1rem; letter-spacing: 4px; }
            .result-wrapper { padding: 15px 10px; }
            .copy-btn { padding: 8px 20px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <canvas id="birdCanvas"></canvas>

    <div id="intro-screen">
        <div id="intro-text"></div>
        <div id="click-prompt">✦ Click anywhere to enter ✦</div>
        <div class="intro-credit">✦ FR4NX ✦</div>
    </div>

    <div id="main-app">
        <div class="container">
            <h1 class="guild-title">ᴘʜᴀɴᴛᴏᴍ・〆</h1>
            <div class="sub-title">Name Generator</div>

            <div class="result-wrapper" id="resultWrapper">
                <div id="result" class="placeholder">✦ Type your name below ✦</div>
                <div class="copy-hint">⬇ Tap the name or button below to copy ⬇</div>
            </div>

            <div class="copy-btn-container">
                <button class="copy-btn" id="manualCopyBtn">📋 Copy Name</button>
            </div>

            <div class="input-area">
                <label for="userName">INPUT YOUR REQUIRED NAME HERE</label>
                <input 
                    type="text" 
                    id="userName" 
                    placeholder="e.g. Shadow" 
                    oninput="updatePreview()"
                    autofocus
                >
            </div>

            <button class="btn" onclick="updatePreview()">D O N E ?</button>
            <div class="footer-note">ᴄʜᴀɴɴᴇʟ ᴛʜᴇ ᴠᴏɪᴅ</div>
        </div>
    </div>

    <audio id="bg-music" loop preload="auto">
        <source src="./music.mp3" type="audio/mpeg">
        <source src="/SYMBOL-GUILD-NAME-GENERATOR/music.mp3" type="audio/mpeg">
    </audio>

    <script>
        // =============================================
        // 1. TYPING INTRO
        // =============================================
        const introLines = [
            "Welcome to Phantom ・〆 Guild name generator.",
            "Here, you get your official Phantom name signature and text style.",
            "Just type your name below and see it transform.",
            "Tap the result to copy it.",
            "Created by FR4NX."
        ];

        const introContainer = document.getElementById('intro-text');
        const introScreen = document.getElementById('intro-screen');
        const mainApp = document.getElementById('main-app');
        const clickPrompt = document.getElementById('click-prompt');

        let lineIndex = 0;
        let introComplete = false;

        function typeLine() {
            if (lineIndex >= introLines.length) {
                introComplete = true;
                clickPrompt.classList.add('show');
                return;
            }

            const currentLine = introLines[lineIndex];
            const lineElement = document.createElement('div');
            lineElement.className = 'line';
            introContainer.appendChild(lineElement);

            let currentChar = 0;
            function typeChar() {
                if (currentChar < currentLine.length) {
                    lineElement.textContent += currentLine[currentChar];
                    currentChar++;
                    setTimeout(typeChar, 45);
                } else {
                    const cursor = document.createElement('span');
                    cursor.className = 'cursor-blink';
                    lineElement.appendChild(cursor);
                    lineIndex++;
                    setTimeout(typeLine, 300);
                }
            }
            typeChar();
        }

        window.addEventListener('load', typeLine);

        // =============================================
        // 2. MUSIC
        // =============================================
        const audio = document.getElementById('bg-music');
        let musicStarted = false;
        audio.volume = 1.0;

        audio.addEventListener('canplaythrough', () => console.log('✅ Music ready'));
        if (audio.readyState >= 3) audioReady = true;

        function playMusic() {
            if (musicStarted) return;
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    musicStarted = true;
                    console.log('🔊 Horror at MAX VOLUME!');
                }).catch(err => console.log('⛔ Play blocked:', err.message));
            }
        }

        introScreen.addEventListener('click', function(e) {
            if (introComplete) {
                introScreen.classList.add('fade-out');
                mainApp.classList.add('visible');
                playMusic();
                setTimeout(() => startBirds(), 500);
            }
        });
        introScreen.addEventListener('touchstart', function(e) {
            if (introComplete) {
                introScreen.classList.add('fade-out');
                mainApp.classList.add('visible');
                playMusic();
                setTimeout(() => startBirds(), 500);
            }
        }, { passive: true });

        document.addEventListener('click', function() {
            if (introComplete && !musicStarted) playMusic();
        });

        // =============================================
        // 3. NAME GENERATOR
        // =============================================
        const smallCapsMap = {
            'a':'ᴀ','b':'ʙ','c':'ᴄ','d':'ᴅ','e':'ᴇ',
            'f':'ꜰ','g':'ɢ','h':'ʜ','i':'ɪ','j':'ᴊ',
            'k':'ᴋ','l':'ʟ','m':'ᴍ','n':'ɴ','o':'ᴏ',
            'p':'ᴘ','q':'ǫ','r':'ʀ','s':'ꜱ','t':'ᴛ',
            'u':'ᴜ','v':'ᴠ','w':'ᴡ','x':'x','y':'ʏ','z':'ᴢ'
        };

        let currentGeneratedName = '';

        function updatePreview() {
            const inputField = document.getElementById('userName');
            const resultDisplay = document.getElementById('result');
            let rawName = inputField.value.trim();

            if (rawName === '') {
                resultDisplay.textContent = '✦ Type your name below ✦';
                resultDisplay.className = 'placeholder';
                currentGeneratedName = '';
                return;
            }

            const smallName = rawName.toLowerCase().split('').map(ch => smallCapsMap[ch] || ch).join('');
            const phantomIdentity = smallName + '・〆';
            currentGeneratedName = phantomIdentity;

            resultDisplay.textContent = phantomIdentity;
            resultDisplay.className = '';
            resultDisplay.style.color = '#f2e9ff';
            resultDisplay.style.textShadow = '0 0 40px #9b6dff, 0 0 80px #4a1a7a';
        }

        // =============================================
        // 4. COPY – iOS‑RELIABLE
        // =============================================
        function copyResult() {
            const resultDisplay = document.getElementById('result');
            const textToCopy = currentGeneratedName;

            if (!textToCopy || resultDisplay.className === 'placeholder') {
                resultDisplay.textContent = '⚠️ TYPE A NAME FIRST!';
                resultDisplay.style.color = '#ff8888';
                resultDisplay.style.textShadow = '0 0 30px #ff2222';
                setTimeout(() => {
                    if (document.getElementById('userName').value.trim() === '') {
                        resultDisplay.textContent = '✦ Type your name below ✦';
                        resultDisplay.className = 'placeholder';
                    } else {
                        updatePreview();
                    }
                }, 1500);
                return;
            }

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(textToCopy)
                    .then(() => showCopiedFeedback(resultDisplay))
                    .catch(() => fallbackCopyText(textToCopy, resultDisplay));
            } else {
                fallbackCopyText(textToCopy, resultDisplay);
            }
        }

        function fallbackCopyText(text, resultDisplay) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.left = '0';
            textarea.style.top = '0';
            textarea.style.width = '1px';
            textarea.style.height = '1px';
            textarea.style.opacity = '0.5';
            textarea.style.zIndex = '9999';
            textarea.style.pointerEvents = 'none';
            textarea.setAttribute('readonly', '');
            document.body.appendChild(textarea);

            setTimeout(() => {
                textarea.focus();
                textarea.select();
                textarea.setSelectionRange(0, text.length);

                try {
                    const success = document.execCommand('copy');
                    if (success) {
                        showCopiedFeedback(resultDisplay);
                    } else {
                        resultDisplay.textContent = '❌ Copy failed, try again';
                        resultDisplay.style.color = '#ff8888';
                        setTimeout(() => {
                            if (currentGeneratedName) {
                                resultDisplay.textContent = currentGeneratedName;
                                resultDisplay.style.color = '#f2e9ff';
                                resultDisplay.style.textShadow = '0 0 40px #9b6dff, 0 0 80px #4a1a7a';
                            }
                        }, 1500);
                    }
                } catch (e) {
                    resultDisplay.textContent = '❌ Copy failed';
                    resultDisplay.style.color = '#ff8888';
                    setTimeout(() => {
                        if (currentGeneratedName) {
                            resultDisplay.textContent = currentGeneratedName;
                            resultDisplay.style.color = '#f2e9ff';
                            resultDisplay.style.textShadow = '0 0 40px #9b6dff, 0 0 80px #4a1a7a';
                        }
                    }, 1500);
                }
                document.body.removeChild(textarea);
            }, 50);
        }

        function showCopiedFeedback(resultDisplay) {
            resultDisplay.textContent = '✅  COPIED!  ✅';
            resultDisplay.style.color = '#b3ff9b';
            resultDisplay.style.textShadow = '0 0 40px #66ff33';
            setTimeout(() => {
                if (currentGeneratedName) {
                    resultDisplay.textContent = currentGeneratedName;
                    resultDisplay.style.color = '#f2e9ff';
                    resultDisplay.style.textShadow = '0 0 40px #9b6dff, 0 0 80px #4a1a7a';
                }
            }, 1500);
        }

        const resultWrapper = document.getElementById('resultWrapper');
        resultWrapper.addEventListener('click', copyResult);
        resultWrapper.addEventListener('touchstart', copyResult, { passive: true });

        const manualCopyBtn = document.getElementById('manualCopyBtn');
        manualCopyBtn.addEventListener('click', copyResult);
        manualCopyBtn.addEventListener('touchstart', copyResult, { passive: true });

        document.getElementById('userName').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') updatePreview();
        });

        audio.addEventListener('ended', () => audio.play().catch(() => {}));

        // =============================================
        // 5. BIRD ANIMATION – IMPROVED FLIGHT & VISIBILITY
        // =============================================
        const canvas = document.getElementById('birdCanvas');
        const ctx = canvas.getContext('2d');
        let birds = [];
        let mistParticles = [];
        let animationId = null;
        let birdsActive = false;
        let titleRect = { x: 0, y: 0, width: 0, height: 0 };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Raven {
            constructor() {
                this.reset();
            }

            reset() {
                const margin = 150;
                const side = Math.floor(Math.random() * 4);
                if (side === 0) { this.x = Math.random() * canvas.width; this.y = -margin; }
                else if (side === 1) { this.x = canvas.width + margin; this.y = Math.random() * canvas.height; }
                else if (side === 2) { this.x = Math.random() * canvas.width; this.y = canvas.height + margin; }
                else { this.x = -margin; this.y = Math.random() * canvas.height; }

                this.targetX = canvas.width / 2 + (Math.random() - 0.5) * 500;
                this.targetY = canvas.height / 2 - 30 + (Math.random() - 0.5) * 350;

                // Speed and motion
                this.speed = 0.5 + Math.random() * 0.7;
                this.angle = 0;
                this.size = 22 + Math.random() * 14; // large

                // Wing flapping – smoother
                this.wingPhase = Math.random() * Math.PI * 2;
                this.wingSpeed = 0.04 + Math.random() * 0.025;

                // Curved path with banking
                this.curvePhase = Math.random() * Math.PI * 2;
                this.curveSpeed = 0.004 + Math.random() * 0.01;
                this.bankAngle = 0;

                this.alive = true;
                this.opacity = 1;
                this.disappearing = false;
                this.disappearTimer = 0;

                // Colors – deeper, more realistic
                const hue = 260 + Math.random() * 20;
                this.bodyColor = `hsl(${hue}, 40%, 10%)`;
                this.wingColor = `hsl(${hue + 10}, 50%, 15%)`;
                this.glowColor = `hsla(${hue}, 80%, 60%, 0.1)`;
            }

            update() {
                if (this.disappearing) {
                    this.disappearTimer += 0.02;
                    this.opacity = 1 - this.disappearTimer;
                    if (this.disappearTimer < 0.8 && Math.random() < 0.25) {
                        spawnMist(this.x + (Math.random()-0.5)*25, this.y + (Math.random()-0.5)*25);
                    }
                    if (this.disappearTimer >= 1) { this.alive = false; }
                    return;
                }

                // Move toward target with banking
                const dx = this.targetX - this.x;
                const dy = this.targetY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > 10) {
                    const angle = Math.atan2(dy, dx);
                    // Curved flight
                    const curve = Math.sin(this.curvePhase) * 0.25;
                    const moveAngle = angle + curve;
                    this.x += Math.cos(moveAngle) * this.speed;
                    this.y += Math.sin(moveAngle) * this.speed;
                    this.curvePhase += this.curveSpeed;
                    // Body bob
                    this.y += Math.sin(this.curvePhase * 1.8) * 0.4;
                    // Banking angle for visual flair
                    this.bankAngle = curve * 0.3;
                } else {
                    this.targetX = canvas.width / 2 + (Math.random() - 0.5) * 500;
                    this.targetY = canvas.height / 2 - 30 + (Math.random() - 0.5) * 350;
                }

                this.wingPhase += this.wingSpeed;
                this.angle = Math.atan2(this.targetY - this.y, this.targetX - this.x);

                // Collision with title
                const titleEl = document.querySelector('.guild-title');
                if (titleEl) {
                    const rect = titleEl.getBoundingClientRect();
                    titleRect = {
                        x: rect.left + rect.width * 0.05,
                        y: rect.top + rect.height * 0.05,
                        width: rect.width * 0.9,
                        height: rect.height * 0.9
                    };
                    if (this.x > titleRect.x && this.x < titleRect.x + titleRect.width &&
                        this.y > titleRect.y && this.y < titleRect.y + titleRect.height) {
                        this.triggerDisappear();
                    }
                }
            }

            triggerDisappear() {
                if (this.disappearing) return;
                this.disappearing = true;
                this.disappearTimer = 0;
                for (let i = 0; i < 20; i++) {
                    spawnMist(this.x + (Math.random()-0.5)*40, this.y + (Math.random()-0.5)*40);
                }
            }

            draw() {
                if (!this.alive || this.opacity <= 0) return;
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                // Add banking tilt
                ctx.rotate(this.bankAngle);

                const flap = Math.sin(this.wingPhase);
                const size = this.size;

                // Glow aura behind
                ctx.shadowColor = '#9b6dff';
                ctx.shadowBlur = 30;

                // ---- Body ----
                ctx.fillStyle = this.bodyColor;
                ctx.beginPath();
                ctx.ellipse(0, 0, size * 0.55, size * 0.3, 0, 0, Math.PI * 2);
                ctx.fill();

                // ---- Head ----
                ctx.fillStyle = this.bodyColor;
                ctx.beginPath();
                ctx.arc(size * 0.45, -size * 0.05, size * 0.25, 0, Math.PI * 2);
                ctx.fill();

                // ---- Beak ----
                ctx.fillStyle = '#1a0a2a';
                ctx.beginPath();
                ctx.moveTo(size * 0.65, -size * 0.07);
                ctx.lineTo(size * 0.95, -size * 0.02);
                ctx.lineTo(size * 0.65, size * 0.05);
                ctx.fill();

                // ---- Eye ----
                ctx.shadowBlur = 15;
                ctx.fillStyle = '#b36bff';
                ctx.beginPath();
                ctx.arc(size * 0.55, -size * 0.1, size * 0.06, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(size * 0.56, -size * 0.12, size * 0.02, 0, Math.PI * 2);
                ctx.fill();

                // ---- Left Wing (more detailed) ----
                ctx.shadowBlur = 20;
                ctx.fillStyle = this.wingColor;
                ctx.beginPath();
                ctx.moveTo(-size * 0.15, -size * 0.08);
                // Wing curves up and back with feather-like shape
                const wingUp = -size * 0.7 - Math.abs(flap) * size * 0.4;
                const wingOut = -size * 0.4 - flap * size * 0.3;
                ctx.quadraticCurveTo(-size * 0.4, -size * 0.5 + flap * size * 0.3, wingOut, wingUp);
                ctx.quadraticCurveTo(-size * 0.5, -size * 0.25 + flap * size * 0.2, -size * 0.15, -size * 0.08);
                ctx.fill();

                // Wing feather lines (subtle)
                ctx.strokeStyle = 'rgba(180,130,255,0.1)';
                ctx.lineWidth = 1;
                for (let i = 0; i < 3; i++) {
                    const t = i / 3;
                    ctx.beginPath();
                    ctx.moveTo(-size * 0.2 - t * size * 0.3, -size * 0.1 + t * size * 0.1);
                    ctx.lineTo(-size * 0.5 - t * size * 0.4, -size * 0.3 + t * size * 0.3 + flap * size * 0.2);
                    ctx.stroke();
                }

                // ---- Right Wing ----
                ctx.fillStyle = this.wingColor;
                ctx.beginPath();
                ctx.moveTo(-size * 0.15, size * 0.08);
                const wingDown = -size * 0.7 - Math.abs(flap) * size * 0.4;
                const wingOut2 = -size * 0.4 + flap * size * 0.3;
                ctx.quadraticCurveTo(-size * 0.4, size * 0.5 - flap * size * 0.3, wingOut2, wingDown);
                ctx.quadraticCurveTo(-size * 0.5, size * 0.25 - flap * size * 0.2, -size * 0.15, size * 0.08);
                ctx.fill();

                // ---- Tail ----
                ctx.fillStyle = this.bodyColor;
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.moveTo(-size * 0.45, -size * 0.1);
                ctx.lineTo(-size * 1.0, -size * 0.3 - flap * size * 0.1);
                ctx.lineTo(-size * 1.0, size * 0.3 + flap * size * 0.1);
                ctx.lineTo(-size * 0.45, size * 0.1);
                ctx.fill();

                ctx.restore();
            }
        }

        // ---- Mist particles ----
        function spawnMist(x, y) {
            mistParticles.push({
                x, y,
                vx: (Math.random()-0.5) * 2,
                vy: (Math.random()-0.5) * 2 - 0.5,
                life: 1,
                size: 8 + Math.random() * 20,
                color: `hsla(260, 80%, 60%, ${0.1 + Math.random() * 0.2})`
            });
        }

        function updateMist() {
            for (let i = mistParticles.length - 1; i >= 0; i--) {
                const p = mistParticles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.02;
                p.life -= 0.01;
                if (p.life <= 0) mistParticles.splice(i, 1);
            }
        }

        function drawMist() {
            for (const p of mistParticles) {
                ctx.save();
                ctx.globalAlpha = p.life * 0.5;
                ctx.shadowColor = '#9b6dff';
                ctx.shadowBlur = 50;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * (1 - p.life * 0.4), 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // ---- Main animation ----
        function animateBirds() {
            if (!birdsActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (const bird of birds) {
                bird.update();
                bird.draw();
            }
            birds = birds.filter(b => b.alive);

            updateMist();
            drawMist();

            // Keep 20-30 ravens
            while (birds.length < 20 + Math.floor(Math.random() * 10)) {
                birds.push(new Raven());
            }

            animationId = requestAnimationFrame(animateBirds);
        }

        function startBirds() {
            if (birdsActive) return;
            birdsActive = true;
            for (let i = 0; i < 30; i++) {
                const bird = new Raven();
                bird.x = Math.random() * canvas.width;
                bird.y = Math.random() * canvas.height;
                bird.targetX = canvas.width / 2 + (Math.random() - 0.5) * 500;
                bird.targetY = canvas.height / 2 - 30 + (Math.random() - 0.5) * 350;
                birds.push(bird);
            }
            animateBirds();
        }

        document.addEventListener('visibilitychange', () => {
            if (document.hidden && birdsActive) {
                if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
            } else if (!document.hidden && birdsActive && !animationId) {
                animateBirds();
            }
        });

        console.log('🐦‍⬛ Ravens now flying ABOVE the UI – with improved animation!');
    </script>
</body>
</html>
