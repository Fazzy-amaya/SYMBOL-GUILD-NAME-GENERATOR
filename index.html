<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ᴘʜᴀɴᴛᴏᴍ・〆 — Name Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            padding: 20px;
            overflow-y: auto;
            position: relative;
            background: radial-gradient(circle at center, #12081a, #07020a);
        }

        #birdCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            pointer-events: none;
            isolation: isolate;
        }

        #watermark {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            font-size: 0.8rem;
            color: #b396d9;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.7;
            pointer-events: none;
            text-shadow: 0 0 15px rgba(155,109,255,0.25);
            font-family: 'Segoe UI', sans-serif;
            white-space: nowrap;
            background: rgba(10,5,20,0.3);
            padding: 4px 16px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(155,109,255,0.08);
        }

        /* ===== INTRO SCREEN ===== */
        #intro-screen {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #12081a, #07020a);
            padding: 30px;
            transition: opacity 1.2s ease, visibility 1.2s ease;
            opacity: 1;
            visibility: visible;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            overflow-y: auto;
        }
        #intro-screen.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        #intro-text {
            max-width: 750px;
            width: 100%;
            text-align: left;
            font-size: clamp(1.4rem, 4vw, 2.4rem);
            font-weight: 300;
            color: #e4d5ff;
            text-shadow: 0 0 20px #6a2faf;
            line-height: 1.8;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
            z-index: 2;
            position: relative;
        }

        #intro-text .line {
            opacity: 0;
            transform: translateY(8px);
            animation: lineFadeIn 0.3s forwards;
        }
        @keyframes lineFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .cursor-blink {
            display: inline-block;
            width: 3px;
            height: 1.2em;
            background: #9b6dff;
            margin-left: 4px;
            vertical-align: text-bottom;
            animation: blink 0.7s step-end infinite;
        }
        @keyframes blink {
            0%,100%{opacity:1;} 50%{opacity:0;}
        }

        #click-prompt {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #b396d9;
            letter-spacing: 4px;
            opacity: 0;
            display: none;
            font-family: 'Segoe UI', sans-serif;
            z-index: 2;
            position: relative;
        }
        #click-prompt.show {
            display: block;
            animation: fadeInPrompt 0.8s forwards, pulseGlow 1.5s ease-in-out infinite;
        }
        @keyframes fadeInPrompt { to { opacity: 1; } }
        @keyframes pulseGlow {
            0%,100% { text-shadow: 0 0 10px #6a2faf; }
            50% { text-shadow: 0 0 30px #9b6dff, 0 0 60px #4a1a7a; }
        }

        /* ===== MAIN APP ===== */
        #main-app {
            opacity: 0;
            transition: opacity 1.5s ease;
            width: 100%;
            max-width: 700px;
            pointer-events: none;
            max-height: 90vh;
            overflow-y: auto;
            padding: 5px;
            position: relative;
            z-index: 2;
        }
        #main-app.visible {
            opacity: 1;
            pointer-events: all;
        }

        .container {
            background: rgba(20,10,30,0.5);
            backdrop-filter: blur(12px) saturate(1.2);
            -webkit-backdrop-filter: blur(12px) saturate(1.2);
            border: 1px solid rgba(180,130,255,0.25);
            border-radius: 40px;
            padding: 50px 40px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 60px rgba(100,40,180,0.2), inset 0 0 30px rgba(150,100,220,0.05);
            position: relative;
            overflow: hidden;
        }

        /* ===== GUILD LOGO WRAPPER – FOR OVERLAY EFFECTS ===== */
        .logo-wrapper {
            position: relative;
            display: inline-block;
            max-width: 80%;
            margin: 0 auto 15px auto;
            z-index: 2;
        }

        .guild-logo {
            display: block;
            width: 100%;
            max-height: 180px;
            object-fit: contain;
            filter: drop-shadow(0 0 30px rgba(155,109,255,0.3))
                    drop-shadow(0 0 60px rgba(100,40,180,0.15));
            position: relative;
            z-index: 2;
        }

        /* ===== LIVING EMBER OVERLAY (on top of image) ===== */
        .ember-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
            border-radius: 20px;
            overflow: hidden;
            mix-blend-mode: screen;
        }

        .ember-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* ===== BREATHING GLOW BEHIND LOGO ===== */
        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            background: radial-gradient(circle at center, rgba(255,0,50,0.12), rgba(155,109,255,0.08) 40%, transparent 70%);
            border-radius: 50%;
            animation: breathGlow 3s ease-in-out infinite alternate;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes breathGlow {
            0% { opacity: 0.3; transform: translate(-50%, -50%) scale(0.9); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
        }

        .sub-title {
            font-size: 1rem;
            color: #b396d9;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 30px;
            border-top: 1px solid rgba(150,100,220,0.2);
            border-bottom: 1px solid rgba(150,100,220,0.2);
            display: inline-block;
            padding: 8px 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 30px;
            position: relative;
            z-index: 3;
        }

        .result-wrapper {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 30px;
            border: 1px solid rgba(150,100,220,0.2);
            padding: 25px 20px 15px 20px;
            margin-bottom: 15px;
            transition: 0.3s;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            z-index: 3;
        }
        .result-wrapper:hover { border-color: #9b6dff; box-shadow: 0 0 30px rgba(100,40,200,0.2); }
        .result-wrapper:active { transform: scale(0.98); }

        #result {
            font-size: clamp(2.2rem, 7vw, 4rem);
            font-weight: 400;
            color: #f2e9ff;
            text-shadow: 0 0 40px #9b6dff, 0 0 80px #4a1a7a;
            letter-spacing: 2px;
            word-break: break-word;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            transition: 0.3s;
        }
        #result.placeholder {
            font-size: 1.1rem;
            color: #6a4a8a;
            text-shadow: none;
            letter-spacing: 4px;
            font-weight: 300;
        }

        .result-message {
            font-size: 0.85rem;
            color: #b396d9;
            margin-top: 8px;
            opacity: 0;
            transition: opacity 0.5s ease;
            letter-spacing: 2px;
            font-family: 'Segoe UI', sans-serif;
        }
        .result-message.show { opacity: 1; }

        .copy-hint {
            font-size: 0.75rem;
            color: #7a5a9a;
            letter-spacing: 2px;
            margin-top: 8px;
            pointer-events: none;
        }

        .copy-btn-container {
            margin: 10px 0 20px 0;
            position: relative;
            z-index: 3;
        }
        .copy-btn {
            background: rgba(100,40,180,0.25);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(150,100,220,0.3);
            color: #c4a8f0;
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 2px;
            display: inline-block;
            -webkit-tap-highlight-color: transparent;
        }
        .copy-btn:hover { background: rgba(100,40,180,0.4); border-color: #9b6dff; box-shadow: 0 0 20px rgba(100,40,200,0.2); }
        .copy-btn:active { transform: scale(0.95); }

        .random-section {
            margin: 20px 0 15px 0;
            position: relative;
            z-index: 3;
        }
        .random-btn {
            background: rgba(100,40,180,0.15);
            border: 1px solid rgba(150,100,220,0.2);
            color: #c4a8f0;
            padding: 8px 25px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 2px;
            display: inline-block;
            -webkit-tap-highlight-color: transparent;
        }
        .random-btn:hover { background: rgba(100,40,180,0.3); border-color: #9b6dff; box-shadow: 0 0 20px rgba(100,40,200,0.15); }
        .random-btn:active { transform: scale(0.95); }

        .gender-select {
            display: none;
            margin-top: 12px;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .gender-select.open { display: flex; }

        .gender-btn {
            background: rgba(100,40,180,0.15);
            border: 1px solid rgba(150,100,220,0.25);
            color: #c4a8f0;
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 2px;
            -webkit-tap-highlight-color: transparent;
        }
        .gender-btn:hover { background: rgba(100,40,180,0.3); border-color: #9b6dff; box-shadow: 0 0 20px rgba(100,40,200,0.15); }
        .gender-btn:active { transform: scale(0.95); }
        .gender-btn.male:hover { border-color: #6a8aff; box-shadow: 0 0 20px rgba(100,140,255,0.2); }
        .gender-btn.female:hover { border-color: #ff6a9a; box-shadow: 0 0 20px rgba(255,100,150,0.2); }

        .name-list-container {
            margin-top: 12px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease, opacity 0.5s ease;
            opacity: 0;
        }
        .name-list-container.open { max-height: 600px; opacity: 1; }

        .name-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 8px;
            padding: 10px 0;
        }

        .name-list-item {
            background: rgba(100,40,180,0.1);
            border: 1px solid rgba(150,100,220,0.15);
            border-radius: 20px;
            padding: 8px 12px;
            color: #d4c4f0;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            letter-spacing: 1px;
            font-family: 'Courier New', monospace;
        }
        .name-list-item:hover { background: rgba(100,40,180,0.25); border-color: #9b6dff; transform: scale(1.02); box-shadow: 0 0 15px rgba(100,40,200,0.15); }
        .name-list-item:active { transform: scale(0.95); }

        .generate-more-btn {
            background: rgba(100,40,180,0.1);
            border: 1px dashed rgba(150,100,220,0.25);
            color: #8a7aaa;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 2px;
            margin-top: 5px;
            display: inline-block;
        }
        .generate-more-btn:hover { background: rgba(100,40,180,0.2); border-color: #9b6dff; color: #c4a8f0; }

        .no-more-names { color: #6a4a8a; font-size: 0.8rem; margin-top: 5px; font-style: italic; letter-spacing: 1px; }

        .input-area { position: relative; z-index: 3; }
        .input-area label {
            display: block;
            font-size: 0.9rem;
            color: #c4a8f0;
            letter-spacing: 3px;
            margin-bottom: 12px;
            text-transform: uppercase;
            font-weight: 600;
        }
        .input-area input {
            width: 100%;
            padding: 18px 25px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(150,100,220,0.3);
            border-radius: 60px;
            font-size: 1.2rem;
            color: #f0eaff;
            text-align: center;
            letter-spacing: 2px;
            outline: none;
            transition: 0.3s;
            font-weight: 300;
        }
        .input-area input::placeholder { color: #6a4a8a; font-size: 0.9rem; letter-spacing: 2px; }
        .input-area input:focus { border-color: #9b6dff; box-shadow: 0 0 25px rgba(120,60,220,0.3); background: rgba(10,5,20,0.6); }

        .btn {
            margin-top: 15px;
            padding: 16px 55px;
            background: linear-gradient(135deg, #6c2bb3, #3b1470);
            border: none;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 6px;
            color: #f5ecff;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 30px rgba(100,40,200,0.3);
            text-transform: uppercase;
            position: relative;
            z-index: 3;
        }
        .btn:hover { transform: scale(1.05); background: linear-gradient(135deg, #8235d9, #4f1d8a); box-shadow: 0 0 50px rgba(130,50,220,0.6); }
        .btn:active { transform: scale(0.95); }

        .footer-note { display: none; }

        @media (max-width: 480px) {
            .container { padding: 30px 20px; }
            .btn { padding: 14px 30px; font-size: 1rem; letter-spacing: 4px; }
            .result-wrapper { padding: 15px 10px; }
            .copy-btn { padding: 8px 20px; font-size: 0.9rem; }
            .name-list { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
            .name-list-item { font-size: 0.75rem; padding: 6px 10px; }
            .gender-btn { padding: 8px 20px; font-size: 0.8rem; }
            #watermark { font-size: 0.65rem; padding: 3px 12px; bottom: 10px; }
            .guild-logo { max-height: 120px; }
            .logo-wrapper { max-width: 90%; }
        }
    </style>
</head>
<body>

    <!-- ====== WATERMARK ====== -->
    <div id="watermark">✦ FR4NX ✦</div>

    <!-- ====== BIRD CANVAS ====== -->
    <canvas id="birdCanvas"></canvas>

    <!-- ====== INTRO SCREEN ====== -->
    <div id="intro-screen">
        <div id="intro-text"></div>
        <div id="click-prompt">✦ Click anywhere to enter ✦</div>
    </div>

    <!-- ====== MAIN APP ====== -->
    <div id="main-app">
        <div class="container">

            <!-- ===== GUILD LOGO WITH LIVING OVERLAY ===== -->
            <div class="logo-wrapper">
                <div class="logo-glow"></div>
                <img class="guild-logo" src="./Guild.jpg" alt="Phantom Guild" />
                <div class="ember-overlay">
                    <canvas class="ember-canvas" id="emberCanvas"></canvas>
                </div>
            </div>

            <div class="sub-title">Name Generator</div>

            <div class="result-wrapper" id="resultWrapper">
                <div id="result" class="placeholder">✦ Type your name below ✦</div>
                <div class="result-message" id="resultMessage"></div>
                <div class="copy-hint">⬇ Tap the name or button below to copy ⬇</div>
            </div>

            <div class="copy-btn-container">
                <button class="copy-btn" id="manualCopyBtn">📋 Copy Name</button>
            </div>

            <!-- ===== RANDOM NAME SECTION ===== -->
            <div class="random-section">
                <button class="random-btn" id="randomToggleBtn">🎲 Random Name</button>

                <div class="gender-select" id="genderSelect">
                    <button class="gender-btn male" data-gender="male">♂ Male</button>
                    <button class="gender-btn female" data-gender="female">♀ Female</button>
                </div>

                <div class="name-list-container" id="nameListContainer">
                    <div class="name-list" id="nameList"></div>
                    <button class="generate-more-btn" id="generateMoreBtn">↻ Generate More</button>
                    <div class="no-more-names" id="noMoreNames" style="display:none;">✨ All names have been shown</div>
                </div>
            </div>

            <div class="input-area">
                <label for="userName">INPUT YOUR REQUIRED NAME HERE</label>
                <input type="text" id="userName" placeholder="e.g. Shadow" oninput="updatePreview()" autofocus />
            </div>

            <button class="btn" id="doneBtn">D O N E ?</button>
        </div>
    </div>

    <!-- ====== AUDIO ====== -->
    <audio id="bg-music" loop preload="auto">
        <source src="./music.mp3" type="audio/mpeg" />
        <source src="/SYMBOL-GUILD-NAME-GENERATOR/music.mp3" type="audio/mpeg" />
    </audio>

    <script>
        // =============================================
        // 0. AUDIO CONTEXT & INTRO (unchanged)
        // =============================================
        let audioCtx = null;
        let audioCtxResumed = false;
        function resumeAudioContext() {
            if (audioCtxResumed) return;
            try {
                if (!audioCtx) { audioCtx = new(window.AudioContext || window.webkitAudioContext)(); }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume().then(() => { audioCtxResumed = true; console.log('🔊 AudioContext resumed'); })
                           .catch(e => console.log('⛔ Resume failed:', e));
                } else { audioCtxResumed = true; }
            } catch (e) {}
        }
        document.addEventListener('click', resumeAudioContext);
        document.addEventListener('touchstart', resumeAudioContext);
        document.addEventListener('keydown', resumeAudioContext);

        const introLines = [
            "Welcome to Phantom ・〆 Guild name generator.",
            "Here, you get your official Phantom name signature and text style.",
            "Just type your name below and see it transform.",
            "Tap the result to copy it."
        ];
        const introContainer = document.getElementById('intro-text');
        const introScreen = document.getElementById('intro-screen');
        const mainApp = document.getElementById('main-app');
        const clickPrompt = document.getElementById('click-prompt');
        let lineIndex = 0;
        let introComplete = false;

        function playKeyboardClick() {
            try {
                if (!audioCtx) { audioCtx = new(window.AudioContext || window.webkitAudioContext)(); }
                if (audioCtx.state === 'suspended') { audioCtx.resume().catch(() => {}); }
                if (audioCtx.state !== 'running') return;
                const now = audioCtx.currentTime;
                const bufferSize = audioCtx.sampleRate * 0.04;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.3));
                }
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
                noise.connect(gain);
                gain.connect(audioCtx.destination);
                noise.start(now);
                noise.stop(now + 0.06);
                const osc = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc.frequency.value = 1800 + Math.random() * 600;
                osc.type = 'square';
                gain2.gain.setValueAtTime(0.04, now);
                gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.02);
                osc.start(now);
                osc.stop(now + 0.02);
            } catch (e) {}
        }

        function typeLine() {
            if (lineIndex >= introLines.length) {
                introComplete = true;
                clickPrompt.classList.add('show');
                return;
            }
            const currentLine = introLines[lineIndex];
            const lineElement = document.createElement('div');
            lineElement.className = 'line';
            introContainer.appendChild(lineElement);
            let currentChar = 0;
            function typeChar() {
                if (currentChar < currentLine.length) {
                    const char = currentLine[currentChar];
                    lineElement.textContent += char;
                    if (char === ' ') {
                        try {
                            if (audioCtx && audioCtx.state === 'running') {
                                const now = audioCtx.currentTime;
                                const osc = audioCtx.createOscillator();
                                const gain = audioCtx.createGain();
                                osc.connect(gain);
                                gain.connect(audioCtx.destination);
                                osc.frequency.value = 300 + Math.random() * 200;
                                osc.type = 'sine';
                                gain.gain.setValueAtTime(0.02, now);
                                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
                                osc.start(now);
                                osc.stop(now + 0.03);
                            }
                        } catch (e) {}
                    } else {
                        playKeyboardClick();
                    }
                    currentChar++;
                    setTimeout(typeChar, 45);
                } else {
                    const cursor = document.createElement('span');
                    cursor.className = 'cursor-blink';
                    lineElement.appendChild(cursor);
                    lineIndex++;
                    setTimeout(typeLine, 300);
                }
            }
            typeChar();
        }
        window.addEventListener('load', typeLine);

        const audio = document.getElementById('bg-music');
        let musicStarted = false;
        audio.volume = 0.25;
        function playMusic() {
            if (musicStarted) return;
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => { musicStarted = true; console.log('🔊 Aurora playing'); })
                          .catch(err => console.log('⛔ Play blocked:', err.message));
            }
        }
        introScreen.addEventListener('click', function(e) {
            if (introComplete) {
                introScreen.classList.add('fade-out');
                mainApp.classList.add('visible');
                playMusic();
                setTimeout(() => startBirds(), 400);
                setTimeout(() => startEmbers(), 500);
            }
        });
        introScreen.addEventListener('touchstart', function(e) {
            if (introComplete) {
                introScreen.classList.add('fade-out');
                mainApp.classList.add('visible');
                playMusic();
                setTimeout(() => startBirds(), 400);
                setTimeout(() => startEmbers(), 500);
            }
        }, { passive: true });

        // =============================================
        // 1. NAME GENERATOR (unchanged)
        // =============================================
        const smallCapsMap = { 'a':'ᴀ','b':'ʙ','c':'ᴄ','d':'ᴅ','e':'ᴇ','f':'ꜰ','g':'ɢ','h':'ʜ','i':'ɪ','j':'ᴊ','k':'ᴋ','l':'ʟ','m':'ᴍ','n':'ɴ','o':'ᴏ','p':'ᴘ','q':'ǫ','r':'ʀ','s':'ꜱ','t':'ᴛ','u':'ᴜ','v':'ᴠ','w':'ᴡ','x':'x','y':'ʏ','z':'ᴢ' };
        let currentGeneratedName = '';
        function updatePreview() {
            const inputField = document.getElementById('userName');
            const resultDisplay = document.getElementById('result');
            const resultMessage = document.getElementById('resultMessage');
            let rawName = inputField.value.trim();
            if (rawName === '') {
                resultDisplay.textContent = '✦ Type your name below ✦';
                resultDisplay.className = 'placeholder';
                currentGeneratedName = '';
                resultMessage.textContent = '';
                resultMessage.className = 'result-message';
                return;
            }
            const smallName = rawName.toLowerCase().split('').map(ch => smallCapsMap[ch] || ch).join('');
            const phantomIdentity = smallName + '・〆';
            currentGeneratedName = phantomIdentity;
            resultDisplay.textContent = phantomIdentity;
            resultDisplay.className = '';
            resultDisplay.style.color = '#f2e9ff';
            resultDisplay.style.textShadow = '0 0 40px #9b6dff, 0 0 80px #4a1a7a';
            resultMessage.textContent = 'Now go and meet Huios, the Guild Leader.';
            resultMessage.className = 'result-message show';
        }
        document.getElementById('doneBtn').addEventListener('click', function() {
            updatePreview();
            const resultDisplay = document.getElementById('result');
            if (currentGeneratedName) {
                resultDisplay.style.transition = '0.1s';
                resultDisplay.style.textShadow = '0 0 80px #ff66ff, 0 0 160px #9b6dff';
                setTimeout(() => {
                    resultDisplay.style.textShadow = '0 0 40px #9b6dff, 0 0 80px #4a1a7a';
                }, 300);
            }
        });

        // =============================================
        // 2. COPY (unchanged)
        // =============================================
        function copyResult() {
            const resultDisplay = document.getElementById('result');
            const textToCopy = currentGeneratedName;
            if (!textToCopy || resultDisplay.className === 'placeholder') {
                resultDisplay.textContent = '⚠️ TYPE A NAME FIRST!';
                resultDisplay.style.color = '#ff8888';
                resultDisplay.style.textShadow = '0 0 30px #ff2222';
                setTimeout(() => {
                    if (document.getElementById('userName').value.trim() === '') {
                        resultDisplay.textContent = '✦ Type your name below ✦';
                        resultDisplay.className = 'placeholder';
                    } else { updatePreview(); }
                }, 1500);
                return;
            }
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(textToCopy).then(() => showCopiedFeedback(resultDisplay))
                    .catch(() => fallbackCopyText(textToCopy, resultDisplay));
            } else {
                fallbackCopyText(textToCopy, resultDisplay);
            }
        }
        function fallbackCopyText(text, resultDisplay) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.left = '0';
            textarea.style.top = '0';
            textarea.style.width = '1px';
            textarea.style.height = '1px';
            textarea.style.opacity = '0.5';
            textarea.style.zIndex = '9999';
            textarea.style.pointerEvents = 'none';
            textarea.setAttribute('readonly', '');
            document.body.appendChild(textarea);
            setTimeout(() => {
                textarea.focus();
                textarea.select();
                textarea.setSelectionRange(0, text.length);
                try {
                    const success = document.execCommand('copy');
                    if (success) { showCopiedFeedback(resultDisplay); } else { showCopiedFeedback(resultDisplay); }
                } catch (e) { showCopiedFeedback(resultDisplay); }
                document.body.removeChild(textarea);
            }, 50);
        }
        function showCopiedFeedback(resultDisplay) {
            resultDisplay.textContent = '✅  COPIED!  ✅';
            resultDisplay.style.color = '#b3ff9b';
            resultDisplay.style.textShadow = '0 0 40px #66ff33';
            setTimeout(() => {
                if (currentGeneratedName) {
                    resultDisplay.textContent = currentGeneratedName;
                    resultDisplay.style.color = '#f2e9ff';
                    resultDisplay.style.textShadow = '0 0 40px #9b6dff, 0 0 80px #4a1a7a';
                }
            }, 1500);
        }
        const resultWrapper = document.getElementById('resultWrapper');
        resultWrapper.addEventListener('click', copyResult);
        resultWrapper.addEventListener('touchstart', copyResult, { passive: true });
        const manualCopyBtn = document.getElementById('manualCopyBtn');
        manualCopyBtn.addEventListener('click', copyResult);
        manualCopyBtn.addEventListener('touchstart', copyResult, { passive: true });
        document.getElementById('userName').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') { document.getElementById('doneBtn').click(); }
        });
        audio.addEventListener('ended', () => audio.play().catch(() => {}));

        // =============================================
        // 3. RANDOM NAME (unchanged)
        // =============================================
        const maleNames = ['Zephyr','Morwen','Azrael','Thorne','Orion','Draven','Caius','Fenris','Hades','Jareth','Kael','Mordred','Oberon','Quintus','Balthazar','Darian','Gethin','Helios','Icarus','Juno','Keres','Lucian','Magnus','Nero','Onyx','Phelan','Riven','Sable','Taliesin','Ursa','Valerian','Wraith','Xerxes','Yorick','Zane','Aether','Bram','Corvus','Dante','Ephraim','Gideon','Hector','Ignis','Lysander','Marius','Orpheus','Percival','Raphael','Severin','Theron'];
        const femaleNames = ['Seraphine','Vesper','Nyx','Ravenna','Selene','Ember','Astrid','Drusilla','Elara','Gwendolyn','Isolde','Lilith','Nephthys','Persephone','Rhiannon','Umbra','Xandria','Yvaine','Zephyra','Amaris','Celestine','Elysia','Fane','Keres','Lirael','Maelis','Nerys','Orenda','Sable','Ursa','Valkyrie','Wren','Yara','Astra','Belladonna','Cassiopeia','Dahlia','Eudora','Freyja','Hecate','Iris','Jade','Luna','Mira','Nova','Onyx','Pandora','Raven','Stella','Tempest','Vega','Willow','Xena','Zara'];
        let currentGender = null;
        let usedIndices = [];
        function getRandomNamesFromArray(arr, count) {
            const available = arr.filter((_, idx) => !usedIndices.includes(idx));
            if (available.length === 0) return [];
            const shuffled = [...available].sort(() => Math.random() - 0.5);
            const selected = shuffled.slice(0, Math.min(count, shuffled.length));
            selected.forEach(name => {
                const idx = arr.indexOf(name);
                if (idx !== -1 && !usedIndices.includes(idx)) usedIndices.push(idx);
            });
            return selected;
        }
        function renderNameList(names) {
            const listContainer = document.getElementById('nameList');
            const noMoreMsg = document.getElementById('noMoreNames');
            listContainer.innerHTML = '';
            if (names.length === 0) { noMoreMsg.style.display = 'block'; return; }
            noMoreMsg.style.display = 'none';
            names.forEach(name => {
                const item = document.createElement('div');
                item.className = 'name-list-item';
                item.textContent = name;
                item.addEventListener('click', function() {
                    document.getElementById('userName').value = name;
                    updatePreview();
                    document.getElementById('doneBtn').click();
                    document.getElementById('nameListContainer').classList.remove('open');
                    document.getElementById('randomToggleBtn').textContent = '🎲 Random Name';
                    document.getElementById('genderSelect').classList.remove('open');
                });
                listContainer.appendChild(item);
            });
        }
        function loadMoreNames() {
            if (!currentGender) return;
            const nameArray = currentGender === 'male' ? maleNames : femaleNames;
            const remaining = nameArray.filter((_, idx) => !usedIndices.includes(idx));
            if (remaining.length === 0) {
                document.getElementById('noMoreNames').style.display = 'block';
                document.getElementById('generateMoreBtn').style.display = 'none';
                return;
            }
            const newNames = getRandomNamesFromArray(nameArray, 7);
            if (newNames.length === 0) {
                document.getElementById('noMoreNames').style.display = 'block';
                document.getElementById('generateMoreBtn').style.display = 'none';
                return;
            }
            renderNameList(newNames);
            const remainingAfter = nameArray.filter((_, idx) => !usedIndices.includes(idx));
            if (remainingAfter.length === 0) {
                document.getElementById('noMoreNames').style.display = 'block';
                document.getElementById('generateMoreBtn').style.display = 'none';
            } else {
                document.getElementById('noMoreNames').style.display = 'none';
                document.getElementById('generateMoreBtn').style.display = 'inline-block';
            }
        }
        document.getElementById('randomToggleBtn').addEventListener('click', function() {
            const genderSelect = document.getElementById('genderSelect');
            const container = document.getElementById('nameListContainer');
            const isOpen = genderSelect.classList.contains('open');
            if (isOpen) {
                genderSelect.classList.remove('open');
                container.classList.remove('open');
                this.textContent = '🎲 Random Name';
                currentGender = null;
                usedIndices = [];
                document.getElementById('noMoreNames').style.display = 'none';
                document.getElementById('generateMoreBtn').style.display = 'inline-block';
                document.getElementById('nameList').innerHTML = '';
            } else {
                genderSelect.classList.add('open');
                container.classList.remove('open');
                this.textContent = '🎲 Random Name (select gender)';
            }
        });
        document.querySelectorAll('.gender-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const gender = this.dataset.gender;
                currentGender = gender;
                usedIndices = [];
                const container = document.getElementById('nameListContainer');
                container.classList.add('open');
                loadMoreNames();
                document.getElementById('randomToggleBtn').textContent = `🎲 ${gender === 'male' ? '♂' : '♀'} Names`;
            });
        });
        document.getElementById('generateMoreBtn').addEventListener('click', function() {
            loadMoreNames();
            this.textContent = '↻ Refreshed!';
            setTimeout(() => { this.textContent = '↻ Generate More'; }, 800);
        });

        // =============================================
        // 4. BIRDS (unchanged)
        // =============================================
        const canvas = document.getElementById('birdCanvas');
        const ctx = canvas.getContext('2d');
        let birds = [];
        let particles = [];
        let animationId = null;
        let birdsActive = false;
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        function getBirdCount() {
            const w = window.innerWidth, h = window.innerHeight;
            const area = w * h;
            let count = Math.floor(area / 80000);
            count = Math.max(20, Math.min(80, count));
            return count;
        }
        class Bird {
            constructor() { this.reset(); }
            reset() {
                const margin = 100;
                const side = Math.floor(Math.random() * 4);
                if (side === 0) { this.x = Math.random() * canvas.width; this.y = -margin; }
                else if (side === 1) { this.x = canvas.width + margin; this.y = Math.random() * canvas.height; }
                else if (side === 2) { this.x = Math.random() * canvas.width; this.y = canvas.height + margin; }
                else { this.x = -margin; this.y = Math.random() * canvas.height; }
                this.targetX = canvas.width/2 + (Math.random()-0.5)*300;
                this.targetY = canvas.height/2 - 50 + (Math.random()-0.5)*200;
                this.speed = 0.6 + Math.random() * 0.6;
                this.angle = 0;
                this.size = 12 + Math.random() * 10;
                this.wingPhase = Math.random() * Math.PI * 2;
                this.wingSpeed = 0.08 + Math.random() * 0.04;
                this.curvePhase = Math.random() * Math.PI * 2;
                this.curveSpeed = 0.005 + Math.random() * 0.01;
                this.alive = true;
                this.opacity = 1;
                this.disappearing = false;
                this.disappearTimer = 0;
            }
            update() {
                if (this.disappearing) {
                    this.disappearTimer += 0.02;
                    this.opacity = 1 - this.disappearTimer;
                    if (this.disappearTimer >= 1) this.alive = false;
                    return;
                }
                const dx = this.targetX - this.x;
                const dy = this.targetY - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 5) {
                    const angle = Math.atan2(dy, dx);
                    const curveAngle = Math.sin(this.curvePhase) * 0.15;
                    const moveAngle = angle + curveAngle;
                    this.x += Math.cos(moveAngle) * this.speed;
                    this.y += Math.sin(moveAngle) * this.speed;
                    this.curvePhase += this.curveSpeed;
                    this.y += Math.sin(this.curvePhase * 2) * 0.3;
                } else {
                    this.targetX = canvas.width/2 + (Math.random()-0.5)*400;
                    this.targetY = canvas.height/2 - 50 + (Math.random()-0.5)*300;
                }
                this.wingPhase += this.wingSpeed;
                this.angle = Math.atan2(this.targetY - this.y, this.targetX - this.x);
                const logoEl = document.querySelector('.guild-logo');
                if (logoEl) {
                    const rect = logoEl.getBoundingClientRect();
                    const logoRect = {
                        x: rect.left + rect.width*0.1,
                        y: rect.top + rect.height*0.1,
                        width: rect.width*0.8,
                        height: rect.height*0.8
                    };
                    if (this.x > logoRect.x && this.x < logoRect.x + logoRect.width &&
                        this.y > logoRect.y && this.y < logoRect.y + logoRect.height) {
                        this.triggerDisappear();
                    }
                }
            }
            triggerDisappear() {
                if (this.disappearing) return;
                this.disappearing = true;
                this.disappearTimer = 0;
                spawnParticles(this.x, this.y);
            }
            draw() {
                if (!this.alive || this.opacity <= 0) return;
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                const wingFlap = Math.sin(this.wingPhase);
                const size = this.size;
                ctx.fillStyle = '#6a4a8a';
                ctx.shadowColor = '#9b6dff';
                ctx.shadowBlur = 15;
                ctx.beginPath(); ctx.ellipse(0,0, size*0.6, size*0.4, 0, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(size*0.5, -size*0.1, size*0.25, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#4a2a6a';
                ctx.beginPath(); ctx.moveTo(size*0.75, -size*0.1); ctx.lineTo(size*0.95, -size*0.05); ctx.lineTo(size*0.75, 0); ctx.fill();
                ctx.fillStyle = '#5a3a7a';
                ctx.beginPath(); ctx.ellipse(-size*0.3, -size*0.2 + wingFlap*size*0.15, size*0.5, size*0.3, -0.3 + wingFlap*0.2, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(-size*0.3, size*0.2 - wingFlap*size*0.15, size*0.5, size*0.3, 0.3 - wingFlap*0.2, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#4a2a6a';
                ctx.beginPath(); ctx.moveTo(-size*0.6, -size*0.15); ctx.lineTo(-size*0.9, -size*0.25 + wingFlap*size*0.1); ctx.lineTo(-size*0.6, size*0.15); ctx.fill();
                ctx.restore();
                ctx.save();
                ctx.globalAlpha = this.opacity * 0.15;
                ctx.shadowColor = '#9b6dff';
                ctx.shadowBlur = 40;
                ctx.beginPath(); ctx.arc(this.x, this.y, size*1.2, 0, Math.PI*2);
                ctx.fillStyle = '#6a2faf'; ctx.fill();
                ctx.restore();
            }
        }
        function spawnParticles(x, y) {
            const count = 20 + Math.floor(Math.random() * 15);
            for (let i=0; i<count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 0.5 + Math.random() * 3;
                particles.push({
                    x, y,
                    vx: Math.cos(angle)*speed,
                    vy: Math.sin(angle)*speed - 0.5,
                    life: 1,
                    size: 2 + Math.random()*4,
                    color: `hsl(${260 + Math.random()*40}, 80%, ${50 + Math.random()*30}%)`
                });
            }
        }
        function updateParticles() {
            for (let i=particles.length-1; i>=0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.05;
                p.life -= 0.015;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }
        function drawParticles() {
            for (const p of particles) {
                ctx.save();
                ctx.globalAlpha = p.life;
                ctx.shadowColor = '#9b6dff';
                ctx.shadowBlur = 20;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }
        }
        function animateBirds() {
            if (!birdsActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (const bird of birds) { bird.update(); bird.draw(); }
            birds = birds.filter(b => b.alive);
            updateParticles();
            drawParticles();
            const targetCount = getBirdCount();
            while (birds.length < targetCount) birds.push(new Bird());
            while (birds.length > targetCount) {
                const toRemove = birds.pop();
                if (toRemove) toRemove.alive = false;
            }
            animationId = requestAnimationFrame(animateBirds);
        }
        function startBirds() {
            if (birdsActive) return;
            birdsActive = true;
            const count = getBirdCount();
            for (let i=0; i<count; i++) {
                const bird = new Bird();
                bird.x = Math.random() * canvas.width;
                bird.y = Math.random() * canvas.height;
                bird.targetX = canvas.width/2 + (Math.random()-0.5)*300;
                bird.targetY = canvas.height/2 - 50 + (Math.random()-0.5)*200;
                birds.push(bird);
            }
            animateBirds();
        }
        window.addEventListener('resize', () => {
            resizeCanvas();
            if (birdsActive) {
                const targetCount = getBirdCount();
                while (birds.length < targetCount) birds.push(new Bird());
                while (birds.length > targetCount) {
                    const toRemove = birds.pop();
                    if (toRemove) toRemove.alive = false;
                }
            }
        });
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && birdsActive) {
                if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
            } else if (!document.hidden && birdsActive && !animationId) {
                animateBirds();
            }
        });

        // =============================================
        // 5. LIVING EMBER OVERLAY (NEW)
        // =============================================
        const emberCanvas = document.getElementById('emberCanvas');
        const emberCtx = emberCanvas.getContext('2d');
        let emberParticles = [];
        let embersActive = false;
        let emberAnimationId = null;

        function resizeEmberCanvas() {
            const parent = emberCanvas.parentElement;
            const rect = parent.getBoundingClientRect();
            emberCanvas.width = rect.width;
            emberCanvas.height = rect.height;
        }

        // Resize ember canvas when logo loads or window resizes
        window.addEventListener('resize', resizeEmberCanvas);
        // Also resize when the main app becomes visible
        const observer = new MutationObserver(() => {
            if (mainApp.classList.contains('visible')) {
                setTimeout(resizeEmberCanvas, 300);
            }
        });
        observer.observe(mainApp, { attributes: true, attributeFilter: ['class'] });

        class Ember {
            constructor() {
                this.reset();
            }
            reset() {
                const w = emberCanvas.width;
                const h = emberCanvas.height;
                this.x = Math.random() * w;
                this.y = h + 10;
                this.size = 2 + Math.random() * 5;
                this.speed = 0.2 + Math.random() * 0.5;
                this.opacity = 0.1 + Math.random() * 0.3;
                this.wobble = Math.random() * 0.5;
                this.wobbleSpeed = 0.01 + Math.random() * 0.02;
                this.wobbleOffset = Math.random() * Math.PI * 2;
                this.life = 1;
                this.decay = 0.002 + Math.random() * 0.004;
                const colors = [
                    'rgba(255, 50, 30, ',  // deep red
                    'rgba(255, 100, 50, ', // orange-red
                    'rgba(200, 50, 100, ', // purple-red
                    'rgba(255, 80, 30, ',  // bright ember
                ];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update() {
                this.y -= this.speed;
                this.x += Math.sin(this.wobbleOffset) * this.wobble;
                this.wobbleOffset += this.wobbleSpeed;
                this.life -= this.decay;
                this.opacity *= 0.995;
                if (this.life <= 0 || this.opacity < 0.01) {
                    this.reset();
                }
            }
            draw() {
                const alpha = this.opacity * this.life;
                if (alpha < 0.01) return;
                emberCtx.save();
                emberCtx.globalAlpha = alpha;
                // Glow
                const gradient = emberCtx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 3
                );
                gradient.addColorStop(0, this.color + '0.8)');
                gradient.addColorStop(0.5, this.color + '0.3)');
                gradient.addColorStop(1, this.color + '0)');
                emberCtx.fillStyle = gradient;
                emberCtx.beginPath();
                emberCtx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                emberCtx.fill();

                // Core
                emberCtx.fillStyle = this.color + '1)';
                emberCtx.shadowColor = '#ff4422';
                emberCtx.shadowBlur = 15;
                emberCtx.beginPath();
                emberCtx.arc(this.x, this.y, this.size * 0.6, 0, Math.PI * 2);
                emberCtx.fill();
                emberCtx.restore();
            }
        }

        function initEmbers() {
            const count = 25 + Math.floor(Math.random() * 15);
            emberParticles = [];
            for (let i = 0; i < count; i++) {
                const e = new Ember();
                // Spread them out vertically
                e.y = Math.random() * emberCanvas.height;
                e.life = 0.3 + Math.random() * 0.7;
                emberParticles.push(e);
            }
        }

        function animateEmbers() {
            if (!embersActive) return;
            emberCtx.clearRect(0, 0, emberCanvas.width, emberCanvas.height);
            for (const e of emberParticles) {
                e.update();
                e.draw();
            }
            emberAnimationId = requestAnimationFrame(animateEmbers);
        }

        function startEmbers() {
            if (embersActive) return;
            resizeEmberCanvas();
            initEmbers();
            embersActive = true;
            animateEmbers();
        }

        // Stop embers when page is hidden (performance)
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && embersActive) {
                if (emberAnimationId) { cancelAnimationFrame(emberAnimationId); emberAnimationId = null; }
            } else if (!document.hidden && embersActive && !emberAnimationId) {
                animateEmbers();
            }
        });

        // Also restart embers if window resizes
        window.addEventListener('resize', () => {
            if (embersActive) {
                resizeEmberCanvas();
                initEmbers();
            }
        });

        console.log('🔥 Living Ember Overlay active!');
    </script>
</body>
