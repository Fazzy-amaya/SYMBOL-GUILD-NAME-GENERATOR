<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ᴘʜᴀɴᴛᴏᴍ・〆 — Name Generator</title>
    <style>
        /* ===== RESET & BASE ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            padding: 20px;
            overflow-y: auto;
            position: relative;
            background: radial-gradient(circle at center, #12081a, #07020a);
            -webkit-overflow-scrolling: touch;
        }

        /* ===== BIRD CANVAS ===== */
        #birdCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            pointer-events: none;
            isolation: isolate;
        }

        /* ===== WATERMARK ===== */
        #watermark {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            font-size: 1.2rem;
            font-weight: 700;
            color: #b396d9;
            letter-spacing: 6px;
            text-transform: uppercase;
            opacity: 0.9;
            pointer-events: none;
            text-shadow: 0 0 30px rgba(155,109,255,0.6), 0 0 60px rgba(155,109,255,0.3), 0 0 100px rgba(100,40,180,0.2);
            font-family: 'Segoe UI', sans-serif;
            white-space: nowrap;
            background: rgba(10,5,20,0.5);
            padding: 8px 28px;
            border-radius: 40px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(155,109,255,0.25);
            animation: watermarkPulse 2.5s ease-in-out infinite alternate;
        }
        @keyframes watermarkPulse {
            0% { text-shadow: 0 0 30px rgba(155,109,255,0.6), 0 0 60px rgba(155,109,255,0.3), 0 0 100px rgba(100,40,180,0.2); border-color: rgba(155,109,255,0.25); }
            100% { text-shadow: 0 0 50px rgba(155,109,255,1), 0 0 100px rgba(155,109,255,0.5), 0 0 150px rgba(100,40,180,0.3); border-color: rgba(155,109,255,0.5); }
        }

        /* ===== PHANTOM EFFECTS – Simplified for performance ===== */
        #effect-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 99999;
            overflow: hidden;
        }
        .trail-particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            background: radial-gradient(circle, rgba(155,109,255,0.6), rgba(100,40,180,0.1));
            box-shadow: 0 0 10px rgba(155,109,255,0.2);
            animation: trailFade 0.7s ease-out forwards;
            will-change: transform, opacity;
        }
        @keyframes trailFade {
            0% { opacity: 0.8; transform: translate(0,0) scale(1); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.4); }
        }
        .ripple-ring {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            border: 1px solid rgba(155,109,255,0.5);
            box-shadow: 0 0 20px rgba(155,109,255,0.15);
            animation: rippleExpand 0.8s ease-out forwards;
            will-change: transform, opacity;
        }
        @keyframes rippleExpand {
            0% { transform: translate(-50%, -50%) scale(0.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
        }
        .ripple-ring:nth-child(2) {
            animation-delay: 0.08s;
            border-color: rgba(200,150,255,0.3);
            border-width: 1px;
        }

        /* ===== INTRO SCREEN ===== */
        #intro-screen {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #12081a, #07020a);
            padding: 30px;
            transition: opacity 1.2s ease, visibility 1.2s ease;
            opacity: 1;
            visibility: visible;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            overflow-y: auto;
        }
        #intro-screen.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        #intro-text {
            max-width: 750px;
            width: 100%;
            text-align: left;
            font-size: clamp(1.4rem, 4vw, 2.4rem);
            font-weight: 300;
            color: #e4d5ff;
            text-shadow: 0 0 20px #6a2faf;
            line-height: 1.8;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
            z-index: 2;
            position: relative;
        }
        #intro-text .line {
            opacity: 0;
            transform: translateY(8px);
            animation: lineFadeIn 0.3s forwards;
        }
        @keyframes lineFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }
        .cursor-blink {
            display: inline-block;
            width: 3px;
            height: 1.2em;
            background: #9b6dff;
            margin-left: 4px;
            vertical-align: text-bottom;
            animation: blink 0.7s step-end infinite;
        }
        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
        #click-prompt {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #b396d9;
            letter-spacing: 4px;
            opacity: 0;
            display: none;
            font-family: 'Segoe UI', sans-serif;
            z-index: 2;
            position: relative;
        }
        #click-prompt.show {
            display: block;
            animation: fadeInPrompt 0.8s forwards, pulseGlow 1.5s ease-in-out infinite;
        }
        @keyframes fadeInPrompt { to { opacity: 1; } }
        @keyframes pulseGlow {
            0%,100% { text-shadow: 0 0 10px #6a2faf; }
            50% { text-shadow: 0 0 30px #9b6dff, 0 0 60px #4a1a7a; }
        }

        /* ===== MAIN APP ===== */
        #main-app {
            opacity: 0;
            transition: opacity 1.5s ease;
            width: 100%;
            max-width: 700px;
            pointer-events: none;
            max-height: 90vh;
            overflow-y: auto;
            padding: 5px;
            position: relative;
            z-index: 2;
        }
        #main-app.visible {
            opacity: 1;
            pointer-events: all;
        }

        .container {
            background: rgba(20,10,30,0.5);
            backdrop-filter: blur(12px) saturate(1.2);
            -webkit-backdrop-filter: blur(12px) saturate(1.2);
            border: 1px solid rgba(180,130,255,0.25);
            border-radius: 40px;
            padding: 50px 40px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 60px rgba(100,40,180,0.2), inset 0 0 30px rgba(150,100,220,0.05);
            position: relative;
            overflow: hidden;
        }

        /* ===== GUILD LOGO ===== */
        .logo-wrapper {
            position: relative;
            display: block;
            width: 100%;
            margin: 0 auto 15px auto;
            z-index: 2;
            padding: 0;
            background: transparent;
        }
        .logo-wrapper::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 95%;
            height: 95%;
            background: radial-gradient(circle at center, rgba(123,46,255,0.1), rgba(75,26,120,0.06) 40%, transparent 70%);
            border-radius: 50%;
            animation: breathGlow 3s ease-in-out infinite alternate;
            z-index: 0;
            pointer-events: none;
        }
        @keyframes breathGlow {
            0% { opacity: 0.3; transform: translate(-50%, -50%) scale(0.9); }
            100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); }
        }
        .guild-logo {
            display: block;
            width: 100%;
            height: auto;
            object-fit: contain;
            position: relative;
            z-index: 2;
            background: #32104F;
            filter: drop-shadow(0 0 20px rgba(123,46,255,0.15));
        }

        .sub-title {
            font-size: 1rem;
            color: #b396d9;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 30px;
            border-top: 1px solid rgba(150,100,220,0.2);
            border-bottom: 1px solid rgba(150,100,220,0.2);
            display: inline-block;
            padding: 8px 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 30px;
            position: relative;
            z-index: 3;
        }

        .result-wrapper {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 30px;
            border: 1px solid rgba(150,100,220,0.2);
            padding: 25px 20px 15px 20px;
            margin-bottom: 15px;
            transition: 0.3s;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            z-index: 3;
        }
        .result-wrapper:hover { border-color: #9b6dff; box-shadow: 0 0 30px rgba(100,40,200,0.15); }
        .result-wrapper:active { transform: scale(0.98); }

        #result {
            font-size: clamp(2.2rem, 7vw, 4rem);
            font-weight: 400;
            color: #f2e9ff;
            text-shadow: 0 0 40px #9b6dff, 0 0 80px #4a1a7a;
            letter-spacing: 2px;
            word-break: break-word;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            transition: 0.3s;
        }
        #result.placeholder {
            font-size: 1.1rem;
            color: #6a4a8a;
            text-shadow: none;
            letter-spacing: 4px;
            font-weight: 300;
        }

        .result-message {
            font-size: 0.85rem;
            color: #b396d9;
            margin-top: 8px;
            opacity: 0;
            transition: opacity 0.5s ease;
            letter-spacing: 2px;
            font-family: 'Segoe UI', sans-serif;
        }
        .result-message.show { opacity: 1; }

        .copy-hint {
            font-size: 0.75rem;
            color: #7a5a9a;
            letter-spacing: 2px;
            margin-top: 8px;
            pointer-events: none;
        }

        .copy-btn-container {
            margin: 10px 0 20px 0;
            position: relative;
            z-index: 3;
        }
        .copy-btn {
            background: rgba(100,40,180,0.25);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(150,100,220,0.3);
            color: #c4a8f0;
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 2px;
            display: inline-block;
            -webkit-tap-highlight-color: transparent;
        }
        .copy-btn:hover { background: rgba(100,40,180,0.4); border-color: #9b6dff; box-shadow: 0 0 20px rgba(100,40,200,0.15); }
        .copy-btn:active { transform: scale(0.95); }

        /* ===== RANDOM NAME SECTION ===== */
        .random-section {
            margin: 20px 0 15px 0;
            position: relative;
            z-index: 3;
        }
        .random-btn {
            background: rgba(100,40,180,0.15);
            border: 1px solid rgba(150,100,220,0.2);
            color: #c4a8f0;
            padding: 8px 25px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 2px;
            display: inline-block;
            -webkit-tap-highlight-color: transparent;
        }
        .random-btn:hover { background: rgba(100,40,180,0.3); border-color: #9b6dff; box-shadow: 0 0 20px rgba(100,40,200,0.15); }
        .random-btn:active { transform: scale(0.95); }

        .gender-select {
            display: none;
            margin-top: 12px;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .gender-select.open { display: flex; }
        .gender-btn {
            background: rgba(100,40,180,0.15);
            border: 1px solid rgba(150,100,220,0.25);
            color: #c4a8f0;
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 2px;
            -webkit-tap-highlight-color: transparent;
        }
        .gender-btn:hover { background: rgba(100,40,180,0.3); border-color: #9b6dff; box-shadow: 0 0 20px rgba(100,40,200,0.15); }
        .gender-btn:active { transform: scale(0.95); }
        .gender-btn.male:hover { border-color: #6a8aff; box-shadow: 0 0 20px rgba(100,140,255,0.15); }
        .gender-btn.female:hover { border-color: #ff6a9a; box-shadow: 0 0 20px rgba(255,100,150,0.15); }

        .name-list-container {
            margin-top: 12px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease, opacity 0.5s ease;
            opacity: 0;
        }
        .name-list-container.open { max-height: 600px; opacity: 1; }

        .name-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 8px;
            padding: 10px 0;
        }
        .name-list-item {
            background: rgba(100,40,180,0.1);
            border: 1px solid rgba(150,100,220,0.15);
            border-radius: 20px;
            padding: 8px 12px;
            color: #d4c4f0;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            letter-spacing: 1px;
            font-family: 'Courier New', monospace;
        }
        .name-list-item:hover { background: rgba(100,40,180,0.25); border-color: #9b6dff; transform: scale(1.02); }
        .name-list-item:active { transform: scale(0.95); }

        .generate-more-btn {
            background: rgba(100,40,180,0.1);
            border: 1px dashed rgba(150,100,220,0.25);
            color: #8a7aaa;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 2px;
            margin-top: 5px;
            display: inline-block;
        }
        .generate-more-btn:hover { background: rgba(100,40,180,0.2); border-color: #9b6dff; color: #c4a8f0; }
        .no-more-names { color: #6a4a8a; font-size: 0.8rem; margin-top: 5px; font-style: italic; letter-spacing: 1px; }

        .input-area {
            position: relative;
            z-index: 3;
        }
        .input-area label {
            display: block;
            font-size: 0.9rem;
            color: #c4a8f0;
            letter-spacing: 3px;
            margin-bottom: 12px;
            text-transform: uppercase;
            font-weight: 600;
        }
        .input-area input {
            width: 100%;
            padding: 18px 25px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(150,100,220,0.3);
            border-radius: 60px;
            font-size: 1.2rem;
            color: #f0eaff;
            text-align: center;
            letter-spacing: 2px;
            outline: none;
            transition: 0.3s;
            font-weight: 300;
            -webkit-appearance: none;
        }
        .input-area input::placeholder { color: #6a4a8a; font-size: 0.9rem; letter-spacing: 2px; }
        .input-area input:focus { border-color: #9b6dff; box-shadow: 0 0 25px rgba(120,60,220,0.2); background: rgba(10,5,20,0.6); }

        .btn {
            margin-top: 15px;
            padding: 16px 55px;
            background: linear-gradient(135deg, #6c2bb3, #3b1470);
            border: none;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 6px;
            color: #f5ecff;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 30px rgba(100,40,200,0.2);
            text-transform: uppercase;
            position: relative;
            z-index: 3;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:hover { transform: scale(1.03); background: linear-gradient(135deg, #8235d9, #4f1d8a); box-shadow: 0 0 40px rgba(130,50,220,0.4); }
        .btn:active { transform: scale(0.95); }

        /* ===== BUY BUTTON ===== */
        .buy-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 14px 40px;
            background: linear-gradient(135deg, #ff6b35, #e63946);
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 2px;
            border-radius: 60px;
            text-decoration: none;
            box-shadow: 0 0 30px rgba(255,107,53,0.3);
            transition: 0.3s;
            border: none;
            cursor: pointer;
            z-index: 3;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }
        .buy-btn:hover { transform: scale(1.03); box-shadow: 0 0 40px rgba(255,107,53,0.5); }
        .buy-btn:active { transform: scale(0.95); }

        /* ===== ACTIVE COUNTERS (Random numbers – no real tracking) ===== */
        .active-counters {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            color: #6a4a8a;
            font-size: 0.7rem;
            letter-spacing: 1px;
            z-index: 3;
            position: relative;
            font-family: 'Segoe UI', sans-serif;
        }
        .active-counters .stat {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }
        .active-counters .stat span {
            color: #b396d9;
            font-weight: 700;
        }
        .active-counters .stat .online-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #66ff33;
            border-radius: 50%;
            animation: onlinePulse 1.5s ease-in-out infinite;
        }
        @keyframes onlinePulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .footer-note { display: none; }

        @media (max-width: 480px) {
            .container { padding: 30px 20px; }
            .btn { padding: 14px 30px; font-size: 1rem; letter-spacing: 4px; }
            .result-wrapper { padding: 15px 10px; }
            .copy-btn { padding: 8px 20px; font-size: 0.9rem; }
            .name-list { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
            .name-list-item { font-size: 0.75rem; padding: 6px 10px; }
            .gender-btn { padding: 8px 20px; font-size: 0.8rem; }
            #watermark { font-size: 1rem; padding: 6px 18px; bottom: 18px; letter-spacing: 4px; }
            .guild-logo { height: auto; }
            .buy-btn { padding: 12px 24px; font-size: 1rem; width: 100%; }
            .active-counters { font-size: 0.6rem; }
        }
    </style>
</head>
<body>

    <!-- ====== WATERMARK ====== -->
    <div id="watermark">✦ FR4NX ✦</div>

    <!-- ====== EFFECT LAYER ====== -->
    <div id="effect-layer"></div>

    <!-- ====== BIRD CANVAS ====== -->
    <canvas id="birdCanvas"></canvas>

    <!-- ====== INTRO SCREEN ====== -->
    <div id="intro-screen">
        <div id="intro-text"></div>
        <div id="click-prompt">✦ Click anywhere to enter ✦</div>
    </div>

    <!-- ====== MAIN APP ====== -->
    <div id="main-app">
        <div class="container">

            <!-- ===== GUILD LOGO ===== -->
            <div class="logo-wrapper">
                <img class="guild-logo" src="./Guild.png" alt="Phantom Guild" />
            </div>

            <div class="sub-title">Name Generator</div>

            <div class="result-wrapper" id="resultWrapper">
                <div id="result" class="placeholder">✦ Type your name below ✦</div>
                <div class="result-message" id="resultMessage"></div>
                <div class="copy-hint">⬇ Tap the name or button below to copy ⬇</div>
            </div>

            <div class="copy-btn-container">
                <button class="copy-btn" id="manualCopyBtn">📋 Copy Name</button>
            </div>

            <!-- ===== RANDOM NAME SECTION ===== -->
            <div class="random-section">
                <button class="random-btn" id="randomToggleBtn">🎲 Random Name</button>

                <div class="gender-select" id="genderSelect">
                    <button class="gender-btn male" data-gender="male">♂ Male</button>
                    <button class="gender-btn female" data-gender="female">♀ Female</button>
                </div>

                <div class="name-list-container" id="nameListContainer">
                    <div class="name-list" id="nameList"></div>
                    <button class="generate-more-btn" id="generateMoreBtn">↻ Generate More</button>
                    <div class="no-more-names" id="noMoreNames" style="display:none;">✨ All names have been shown</div>
                </div>
            </div>

            <div class="input-area">
                <label for="userName">INPUT YOUR REQUIRED NAME HERE</label>
                <input type="text" id="userName" placeholder="e.g. Shadow" oninput="updatePreview()" autofocus />
            </div>

            <button class="btn" id="doneBtn">D O N E ?</button>

            <!-- ===== BUY BUTTON ===== -->
            <a href="https://pdf-tool-by-fr4nx.onrender.com/" target="_blank" class="buy-btn">
                🛒 Buy Free Fire Likes
            </a>

            <!-- ===== ACTIVE COUNTERS ===== -->
            <div class="active-counters">
                <div class="stat">
                    👁️ <span id="visitCount">0</span> visitors have entered the Phantom realm.
                </div>
                <div class="stat">
                    <span class="online-dot"></span>
                    <span id="onlineCount">0</span> active members are online now.
                </div>
            </div>

        </div>
    </div>

    <!-- ====== AUDIO ====== -->
    <audio id="bg-music" loop preload="auto">
        <source src="./music.mp3" type="audio/mpeg" />
        <source src="/SYMBOL-GUILD-NAME-GENERATOR/music.mp3" type="audio/mpeg" />
    </audio>

    <script>
        // =============================================
        // ACTIVE COUNTERS – Random numbers, live updates
        // =============================================
        (function activeCounters() {
            const visitEl = document.getElementById('visitCount');
            const onlineEl = document.getElementById('onlineCount');

            function randomTotal() {
                return Math.floor(Math.random() * 500) + 500; // 500–999
            }
            function randomOnline() {
                return Math.floor(Math.random() * 10) + 3; // 3–12
            }

            let currentTotal = randomTotal();
            function updateTotal() {
                let delta = Math.floor(Math.random() * 21) - 10;
                let newTotal = currentTotal + delta;
                if (newTotal < 500) newTotal = 500 + Math.floor(Math.random() * 50);
                if (newTotal > 999) newTotal = 999 - Math.floor(Math.random() * 50);
                currentTotal = newTotal;
                visitEl.textContent = currentTotal;
            }

            function updateOnline() {
                onlineEl.textContent = randomOnline();
            }

            visitEl.textContent = currentTotal;
            updateOnline();

            setInterval(updateTotal, 20000);
            setInterval(updateOnline, 8000);
        })();


        // =============================================

        const canvas = document.getElementById('birdCanvas');

        let birds = [];

        function resizeCanvas() {

        function getBirdCount() {
            const w = window.innerWidth, h = window.innerHeight;
            const area = w * h;
            // Reduced density: 1 bird per 200,000 px (was 80,000)
            let count = Math.floor(area / 200000);

        }

        class Bird {
            constructor() { this.reset(); }
            reset() {
                const margin = 100;
                const side = Math.floor(Math.random() * 4);
                if (side === 0) { this.x = Math.random() * canvas.width; this.y = -margin; }
                else if (side === 1) { this.x = canvas.width + margin; this.y = Math.random() * canvas.height; }
                else if (side === 2) { this.x = Math.random() * canvas.width; this.y = canvas.height + margin; }
                else { this.x = -margin; this.y = Math.random() * canvas.height; }
                this.targetX = canvas.width/2 + (Math.random()-0.5)*250;
                this.targetY = canvas.height/2 - 50 + (Math.random()-0.5)*150;
                this.speed = 0.5 + Math.random() * 0.5;
                this.angle = 0;
                this.size = 10 + Math.random() * 8;
                this.wingPhase = Math.random() * Math.PI * 2;
                this.wingSpeed = 0.06 + Math.random() * 0.03;
                this.curvePhase = Math.random() * Math.PI * 2;
                this.curveSpeed = 0.004 + Math.random() * 0.008;
                this.alive = true;
                this.opacity = 1;
                this.disappearing = false;
                this.disappearTimer = 0;
            }
            update() {
                if (this.disappearing) {
                    this.disappearTimer += 0.02;
                    this.opacity = 1 - this.disappearTimer;
                    if (this.disappearTimer >= 1) this.alive = false;
                    return;
                }
                const dx = this.targetX - this.x;
                const dy = this.targetY - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 5) {
                    const angle = Math.atan2(dy, dx);
                    const curveAngle = Math.sin(this.curvePhase) * 0.12;
                    const moveAngle = angle + curveAngle;
                    this.x += Math.cos(moveAngle) * this.speed;
                    this.y += Math.sin(moveAngle) * this.speed;
                    this.curvePhase += this.curveSpeed;
                    this.y += Math.sin(this.curvePhase * 2) * 0.2;
                } else {
                    this.targetX = canvas.width/2 + (Math.random()-0.5)*350;
                    this.targetY = canvas.height/2 - 50 + (Math.random()-0.5)*250;
                }
                this.wingPhase += this.wingSpeed;
                this.angle = Math.atan2(this.targetY - this.y, this.targetX - this.x);
                const logoEl = document.querySelector('.guild-logo');
                if (logoEl) {
                    const rect = logoEl.getBoundingClientRect();
                    const logoRect = {
                        x: rect.left + rect.width*0.1,
                        y: rect.top + rect.height*0.1,
                        width: rect.width*0.8,
                        height: rect.height*0.8
                    };
                    if (this.x > logoRect.x && this.x < logoRect.x + logoRect.width &&
                        this.y > logoRect.y && this.y < logoRect.y + logoRect.height) {
                        this.triggerDisappear();
                    }
                }
            }
            triggerDisappear() {
                if (this.disappearing) return;
                this.disappearing = true;
                this.disappearTimer = 0;
                spawnParticles(this.x, this.y);
            }
            draw() {
                if (!this.alive || this.opacity <= 0) return;
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                const wingFlap = Math.sin(this.wingPhase);
                const size = this.size;
                ctx.fillStyle = '#5a3a7a';
                ctx.shadowColor = '#7a4a9a';
                ctx.shadowBlur = 8;
                ctx.beginPath(); ctx.ellipse(0,0, size*0.5, size*0.35, 0, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(size*0.4, -size*0.08, size*0.2, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#3a2a4a';
                ctx.beginPath(); ctx.moveTo(size*0.6, -size*0.08); ctx.lineTo(size*0.75, -size*0.04); ctx.lineTo(size*0.6, 0); ctx.fill();
                ctx.fillStyle = '#4a2a5a';
                ctx.beginPath(); ctx.ellipse(-size*0.25, -size*0.15 + wingFlap*size*0.12, size*0.4, size*0.25, -0.2 + wingFlap*0.15, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(-size*0.25, size*0.15 - wingFlap*size*0.12, size*0.4, size*0.25, 0.2 - wingFlap*0.15, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#3a2a4a';
                ctx.beginPath(); ctx.moveTo(-size*0.5, -size*0.12); ctx.lineTo(-size*0.7, -size*0.2 + wingFlap*size*0.08); ctx.lineTo(-size*0.5, size*0.12); ctx.fill();
                ctx.restore();
                // Glow – simplified
                ctx.save();
                ctx.globalAlpha = this.opacity * 0.1;
                ctx.shadowColor = '#9b6dff';
                ctx.shadowBlur = 20;
                ctx.beginPath(); ctx.arc(this.x, this.y, size*0.8, 0, Math.PI*2);
                ctx.fillStyle = '#6a2faf';
                ctx.fill();
                ctx.restore();
            }
        }

        function spawnParticles(x, y) {
            const count = 15 + Math.floor(Math.random() * 10);
            for (let i=0; i<count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 0.5 + Math.random() * 2;
                particles.push({
                    x, y,
                    vx: Math.cos(angle)*speed,
                    vy: Math.sin(angle)*speed - 0.5,
                    life: 1,
                    size: 2 + Math.random()*3,
                    color: `hsl(${260 + Math.random()*30}, 70%, ${50 + Math.random()*30}%)`
                });
            }
        }

        function updateParticles() {
            for (let i=particles.length-1; i>=0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.04;
                p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawParticles() {
            for (const p of particles) {
                ctx.save();
                ctx.globalAlpha = p.life * 0.6;
                ctx.shadowColor = '#9b6dff';
                ctx.shadowBlur = 10;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
            }
        }

        function animateBirds() {
            if (!birdsActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (const bird of birds) { bird.update(); bird.draw(); }
            birds = birds.filter(b => b.alive);
            updateParticles();
            drawParticles();
            const targetCount = getBirdCount();
            while (birds.length < targetCount) birds.push(new Bird());
            while (birds.length > targetCount) {
                const toRemove = birds.pop();
                if (toRemove) toRemove.alive = false;
            }
            animationId = requestAnimationFrame(animateBirds);
        }

        function startBirds() {
            if (birdsActive) return;
            birdsActive = true;
            const count = getBirdCount();
            for (let i=0; i<count; i++) {
                const bird = new Bird();
                bird.x = Math.random() * canvas.width;
                bird.y = Math.random() * canvas.height;
                bird.targetX = canvas.width/2 + (Math.random()-0.5)*250;
                bird.targetY = canvas.height/2 - 50 + (Math.random()-0.5)*150;
                birds.push(bird);
            }
            animateBirds();
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            if (birdsActive) {
                const targetCount = getBirdCount();
                while (birds.length < targetCount) birds.push(new Bird());
                while (birds.length > targetCount) {
                    const toRemove = birds.pop();
                    if (toRemove) toRemove.alive = false;
                }
            }
        });

        document.addEventListener('visibilitychange', () => {
            if (document.hidden && birdsActive) {
                if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
            } else if (!document.hidden && birdsActive && !animationId) {
                animateBirds();
            }
        });

        console.log('🔥 Phantom Guild – Optimised & Ready');
    </script>
</body>
</html>
