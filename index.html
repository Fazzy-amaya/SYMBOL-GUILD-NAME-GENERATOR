<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ᴘʜᴀɴᴛᴏᴍ・〆 — Name Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            padding: 20px;
            overflow-y: auto;
            position: relative;
            background: radial-gradient(circle at center, #12081a, #07020a);
        }

        /* ===== RIPPLE CONTAINER (stays on top) ===== */
        #ripple-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            overflow: hidden;
            z-index: 99999;
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(123, 46, 255, 0.6), rgba(75, 26, 120, 0.3), transparent 70%);
            box-shadow: 0 0 20px rgba(123, 46, 255, 0.5), 0 0 60px rgba(75, 26, 120, 0.3);
            animation: rippleFade 1.2s ease-out forwards;
            pointer-events: none;
            transform: translate(-50%, -50%);
        }

        .ripple.click {
            background: radial-gradient(circle, rgba(123, 46, 255, 0.8), rgba(155, 109, 255, 0.5), transparent 70%);
            box-shadow: 0 0 40px rgba(123, 46, 255, 0.7), 0 0 100px rgba(75, 26, 120, 0.4);
            animation: rippleClick 1s ease-out forwards;
        }

        @keyframes rippleFade {
            0% { opacity: 0.9; transform: translate(-50%, -50%) scale(0.3); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.8); }
        }
        @keyframes rippleClick {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(2.5); }
        }

        /* ===== WATERMARK ===== */
        #watermark {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10001;
            font-size: 0.95rem;
            color: #c4a8f0;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.85;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(155, 109, 255, 0.6),
                         0 0 40px rgba(123, 46, 255, 0.3),
                         0 0 80px rgba(75, 26, 120, 0.2);
            font-family: 'Segoe UI', sans-serif;
            white-space: nowrap;
            background: rgba(10, 5, 20, 0.4);
            padding: 6px 22px;
            border-radius: 40px;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(155, 109, 255, 0.2);
            animation: watermarkPulse 2.5s ease-in-out infinite alternate;
        }

        @keyframes watermarkPulse {
            0% { text-shadow: 0 0 20px rgba(155, 109, 255, 0.6), 0 0 40px rgba(123, 46, 255, 0.3), 0 0 80px rgba(75, 26, 120, 0.2); opacity: 0.85; }
            100% { text-shadow: 0 0 35px rgba(155, 109, 255, 0.9), 0 0 70px rgba(123, 46, 255, 0.5), 0 0 120px rgba(75, 26, 120, 0.3); opacity: 1; }
        }

        /* ===== EYE WRAPPER – positions behind dashboard ===== */
        .eye-wrapper {
            position: fixed;
            z-index: 1;
            pointer-events: none;
            width: 332px;
            height: 332px;
            /* default size, will be scaled per instance */
            transform-origin: center center;
        }

        /* Each eye instance will have a unique class for positioning */
        .eye-center {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.4);
        }
        .eye-tl {
            top: 8%;
            left: 8%;
            transform: scale(0.7) rotate(-10deg);
        }
        .eye-tr {
            top: 8%;
            right: 8%;
            left: auto;
            transform: scale(0.7) rotate(10deg);
        }
        .eye-bl {
            bottom: 8%;
            left: 8%;
            transform: scale(0.7) rotate(10deg);
        }
        .eye-br {
            bottom: 8%;
            right: 8%;
            left: auto;
            transform: scale(0.7) rotate(-10deg);
        }

        /* --- EYE COMPONENT (adapted from user's code) --- */
        .eye {
            width: 332px;
            height: 332px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: #2a1a3a; /* dark purple base */
            filter: blur(5px);
            animation: eyeAnimation 4s cubic-bezier(1, 0, 1, 1) infinite;
        }

        @keyframes eyeAnimation {
            0%, 33%, 100% {
                box-shadow: inset -8px -13px 20px -10px rgba(50,30,50,0.04), 
                            64px 55px 40px -40px #3a2a5a, 
                            20px 18px 30px -10px #2a1a3a, 
                            inset -70px -50px 60px -30px #4a3a6a, 
                            inset -90px -90px 70px -90px #5a4a7a, 
                            inset -70px -50px 100px -40px #5a4a7a, 
                            inset 80px 50px 80px -50px #c4a8f0, 
                            -25px -15px 50px -10px #c4a8f0, 
                            14px -1px 50px -10px #9b6dff, 
                            1px 9px 50px -10px #9b6dff, 
                            inset -90px 40px 60px -20px rgba(255,50,50,0.2), 
                            inset -90px -120px 60px -20px rgba(255,50,50,0.2);
                transform: translate(-50%, -50%) scale(1.25);
            }
            65% {
                box-shadow: inset -8px -13px 60px -10px rgba(50,30,50,0.2), 
                            44px 35px 20px -20px #4a3a6a, 
                            11px 9px 9px -4px #3a2a5a, 
                            inset -100px -70px 40px -110px #4a3a6a, 
                            inset -90px -90px 70px -90px #5a4a7a, 
                            inset -70px -50px 100px -40px #5a4a7a, 
                            inset 80px 50px 80px -50px #c4a8f0, 
                            -25px -15px 30px -10px #c4a8f0;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .eye::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            box-shadow: inset -50px -20px 30px 0px #e7e2f5, inset 100px 10px 20px -27px #2f2c4c, 0px 0px 10px 7px rgba(231,226,245,1);
            animation: pupilAnimationSize 4s cubic-bezier(1,0,1,1) infinite,
                       pupilAnimationView 4s ease infinite;
        }

        @keyframes pupilAnimationSize {
            0%, 30%, 100% { transform: translate(-50%, -50%) scale(0.85); }
            40%, 90% { transform: translate(-50%, -50%) scale(0.5); }
        }

        @keyframes pupilAnimationView {
            0%, 30%, 100% { box-shadow: inset -50px -20px 30px 0px #e7e2f5, inset 100px 10px 20px -27px #2f2c4c, 0px 0px 10px 7px rgba(231,226,245,1); }
            60%, 66% { box-shadow: inset -50px -20px 30px 0px rgba(231,226,245,0), inset 10px 10px 70px -27px rgba(47,44,76,0), 0px 0px 10px 7px rgba(231,226,245,0); }
            90% { box-shadow: inset -50px -20px 30px 0px #e7e2f5, inset 100px 10px 20px -27px #2f2c4c, 0px 0px 10px 7px rgba(231,226,245,1); }
        }

        /* --- CIRCLES (rotating rings) --- */
        .circle-1 {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 475px;
            height: 475px;
            border-radius: 50%;
            border: 1px solid transparent;
            border-right-color: rgba(255,100,100,0.6);
            animation: circle1AnimationOpacity 4s ease infinite,
                       circle1AnimationMove 4s ease infinite;
        }
        @keyframes circle1AnimationMove {
            00%,100% { transform: translate(-50%, -50%) rotate(49deg); }
            07% { transform: translate(-50%, -50%) rotate(38deg); }
            12%,19%,68% { transform: translate(-50%, -50%) rotate(42deg); }
            26%,30% { transform: translate(-50%, -50%) rotate(82deg); }
            73% { transform: translate(-50%, -50%) rotate(34deg); }
            87%,92% { transform: translate(-50%, -50%) rotate(69deg); }
            94% { transform: translate(-50%, -50%) rotate(65deg); }
        }
        @keyframes circle1AnimationOpacity {
            00%,27%,73%,100% { opacity: 1; }
            30%,70% { opacity: 0; }
        }

        .circle-2 {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 475px;
            height: 475px;
            border-radius: 50%;
            border: 1px solid transparent;
            border-right-color: rgba(255,100,100,0.6);
            animation: circle2AnimationOpacity 4s ease infinite,
                       circle2AnimationMove 4s ease infinite;
        }
        @keyframes circle2AnimationMove {
            0%,100% { transform: translate(-50%, -50%) rotate(229deg); }
            9% { transform: translate(-50%, -50%) rotate(220deg); }
            14%,21% { transform: translate(-50%, -50%) rotate(225deg); }
            29%,67% { transform: translate(-50%, -50%) rotate(262deg); }
            82% { transform: translate(-50%, -50%) rotate(241deg); }
            90%,94% { transform: translate(-50%, -50%) rotate(249deg); }
            99% { transform: translate(-50%, -50%) rotate(245deg); }
        }
        @keyframes circle2AnimationOpacity {
            0%,27%,79%,100% { opacity: 1; }
            30%,76% { opacity: 0; }
        }

        .circle-3 {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 106px;
            height: 280px;
            overflow: hidden;
            transform: translate(-50%, -50%);
        }
        .circle-3::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 393px;
            height: 393px;
            border-radius: 50%;
            border: 1px solid transparent;
            border-right-color: rgba(255,100,100,0.6);
            transform: translate(-50%, -50%) rotate(0deg);
            animation: circle3Animation 4s ease infinite;
        }
        @keyframes circle3Animation {
            0% { transform: translate(-50%, -50%) rotate(-3deg); }
            20% { transform: translate(-50%, -50%) rotate(-107deg); }
            79% { transform: translate(-50%, -50%) rotate(-286deg); }
            100% { transform: translate(-50%, -50%) rotate(-364deg); }
        }

        .circle-4 {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 295px;
            height: 295px;
            border-radius: 50%;
            border: 1px solid transparent;
            border-right-color: rgba(255,200,200,0.8);
            border-left-color: rgba(255,200,200,0.2);
            animation: circle4AnimationMove 4s cubic-bezier(1,0,1,1) infinite,
                       circle4AnimationOpacity 4s ease infinite;
        }
        @keyframes circle4AnimationMove {
            0%,100% { transform: translate(-50%, -50%) rotate(219deg) scale(1); }
            6% { transform: translate(-50%, -50%) rotate(221deg) scale(0.9); }
            16% { transform: translate(-50%, -50%) rotate(302deg) scale(0.9); }
            22% { transform: translate(-50%, -50%) rotate(307deg) scale(0.9); }
            29% { transform: translate(-50%, -50%) rotate(312deg) scale(0.93); }
            33% { transform: translate(-50%, -50%) rotate(310deg) scale(0.93); }
            36% { transform: translate(-50%, -50%) rotate(300deg) scale(0.7); }
            39% { transform: translate(-50%, -50%) rotate(220deg) scale(0.92); }
            50%,57% { transform: translate(-50%, -50%) rotate(248deg) scale(0.92); }
            66% { transform: translate(-50%, -50%) rotate(225deg) scale(0.92); }
            73%,81% { transform: translate(-50%, -50%) rotate(243deg) scale(0.92); }
            93% { transform: translate(-50%, -50%) rotate(215deg) scale(1); }
        }
        @keyframes circle4AnimationOpacity {
            00%,33%,50%,100% { opacity: 1; }
            36%,39% { opacity: 0; }
        }

        /* circle-5 to circle-14 (bagel shapes with clip-path) */
        .circle-5 {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100px;
            height: 100px;
            animation: circle5AnimationSize 4s cubic-bezier(1,0,1,1) infinite,
                       circle5AnimationView 4s ease infinite;
        }
        .circle-5::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 173px;
            height: 173px;
            border-radius: 50%;
            border: 1px solid rgba(255,200,200,0.8);
            transform: translate(-50%, -50%);
        }
        .circle-5::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 177px;
            height: 177px;
            border-radius: 50%;
            border: 1px solid rgba(255,200,200,0.5);
            transform: translate(-50%, -50%);
        }
        @keyframes circle5AnimationSize {
            0%,38%,82.82%,100% { transform: translate(-50%, -50%) scale(1); }
            45%,75.44% { transform: translate(-50%, -50%) scale(0.7); }
        }
        @keyframes circle5AnimationView {
            0%,5.7%,7.4%,9.8%,11.5%,14%,15.6%,18.9%,21.3%,23.8%,25.4%,28.7%,35.3%,42%,77.9%,82.7%,83.6%,85.2%,86.1%,91.8%,93.5%,97.6%,100% { opacity: 1; }
            2.5%,6.6%,8.2%,10.7%,14.8%,18%,20.5%,22.1%,24.6%,27.9%,36%,88.6% { opacity: 0.5; }
            47%,77.8%,82.8%,83.5%,85.3%,86%,90.2%,92.7%,96.8%,99.2% { opacity: 0; }
        }

        .circle-6 {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 190px;
            height: 190px;
            background: repeating-conic-gradient(from 0deg, rgba(255,100,100,0.4) 0deg 1deg, transparent 1deg 2deg);
            clip-path: url(#bagel1);
            border-radius: 50%;
            animation: circle6Animation 4s cubic-bezier(1,0,1,1) infinite;
        }
        @keyframes circle6Animation {
            0% { transform: translate(-50%, -50%) scale(1); }
            8%,35% { transform: translate(-50%, -50%) scale(0.93); opacity: 1; }
            40%,90% { transform: translate(-50%, -50%) scale(0.2); opacity: 0; }
            95%,100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .circle-7 {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 142px;
            height: 142px;
            filter: blur(1px);
            animation: circle6Animation 4s -0.1s cubic-bezier(1,0,1,1) infinite;
        }
        .circle-7::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-conic-gradient(from 0deg, rgba(180,80,80,0.6) 0deg 2deg, transparent 2deg 8deg);
            clip-path: url(#bagel2);
            border-radius: 50%;
        }

        .circle-8 {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 120px;
            height: 120px;
            background: repeating-conic-gradient(from 0deg, rgba(255,200,200,0.68) 0deg 1deg, transparent 1deg 2deg);
            clip-path: url(#bagel3);
            border-radius: 50%;
            animation: circle6Animation 4s -0.13s cubic-bezier(1,0,1,1) infinite;
        }

        .circle-9 {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 76px;
            height: 76px;
            background: repeating-conic-gradient(from 0deg, rgba(255,200,200,0.68) 0deg 1deg, transparent 1deg 2deg);
            clip-path: url(#bagel4);
            border-radius: 50%;
            animation: circle6Animation 4s -0.16s cubic-bezier(1,0,1,1) infinite;
        }

        .circle-10 {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 190px;
            height: 190px;
            background: radial-gradient(rgba(255,100,100,0.6), rgba(200,80,80,0.5), rgba(100,40,60,0.3), transparent 70%);
            clip-path: url(#bagel1);
            border-radius: 50%;
            animation: circle10Animation 4s cubic-bezier(1,0,1,1) infinite;
        }
        @keyframes circle10Animation {
            0% { transform: translate(-50%, -50%) scale(1); }
            4%,30% { transform: translate(-50%, -50%) scale(0.93); opacity: 1; }
            35%,93% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            98%,100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .circle-11 {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 190px;
            height: 190px;
            background: repeating-conic-gradient(from 0deg, rgba(255,200,200,0.1) 0deg 1deg, transparent 1deg 8deg, rgba(255,200,200,0.3) 8deg 9deg, transparent 9deg 10deg, rgba(255,200,200,0.1) 10deg 11deg, transparent 11deg 72deg);
            clip-path: url(#bagel1);
            border-radius: 50%;
            animation: circle11Animation 4s cubic-bezier(1,0,1,1) infinite;
        }
        @keyframes circle11Animation {
            0%,98%,100% { transform: translate(-50%, -50%) rotate(0deg); opacity: 1; }
            15% { transform: translate(-50%, -50%) rotate(45deg); }
            25% { transform: translate(-50%, -50%) rotate(-10deg); }
            30% { opacity: 1; }
            35% { transform: translate(-50%, -50%) rotate(-20deg); opacity: 0; }
            93% { transform: translate(-50%, -50%) rotate(80deg); opacity: 0; }
        }

        .circle-12 {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 190px;
            height: 190px;
            background: repeating-conic-gradient(from 0deg, rgba(255,200,200,0.2) 20deg 21deg, transparent 21deg 40deg, rgba(255,200,200,0.25) 40deg 41deg, transparent 41deg 43deg, rgba(255,200,200,0.15) 43deg 44deg, transparent 44deg 76deg);
            clip-path: url(#bagel1);
            border-radius: 50%;
            animation: circle12Animation 4s cubic-bezier(1,0,1,1) infinite;
        }
        @keyframes circle12Animation {
            0%,96%,100% { transform: translate(-50%, -50%) rotate(0deg); opacity: 1; }
            10% { transform: translate(-50%, -50%) rotate(45deg); }
            25% { transform: translate(-50%, -50%) rotate(-45deg); }
            30% { opacity: 1; }
            35% { transform: translate(-50%, -50%) rotate(50deg); opacity: 0; }
            93% { transform: translate(-50%, -50%) rotate(-90deg); opacity: 0; }
        }

        .circle-13 {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100px;
            height: 100px;
            animation: circle13AnimationSize 4s cubic-bezier(1,0,1,1) infinite,
                       circle13AnimationView 4s ease infinite;
        }
        .circle-13::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 1px solid rgba(255,200,200,0.8);
            transform: translate(-50%, -50%);
        }
        .circle-13::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 1px solid rgba(255,200,200,0.5);
            transform: translate(-50%, -50%);
        }
        @keyframes circle13AnimationSize {
            0%,32%,86%,100% { transform: translate(-50%, -50%) scale(1); }
            38%,82% { transform: translate(-50%, -50%) scale(0.2); }
        }
        @keyframes circle13AnimationView {
            0% { opacity: 1; }
            2.5% { opacity: 0.5; } 5.7% { opacity: 1; } 6.6% { opacity: 0.5; } 7.4% { opacity: 1; } 8.2% { opacity: 0.5; } 9.8% { opacity: 1; } 10.7% { opacity: 0.5; } 11.5%,14% { opacity: 1; } 14.8% { opacity: 0.5; } 15.6% { opacity: 1; } 18% { opacity: 0.5; } 18.9% { opacity: 1; } 20.5% { opacity: 0.5; } 21.3% { opacity: 1; } 22.1% { opacity: 0.5; } 23.8% { opacity: 1; } 24.6% { opacity: 0.5; } 25.4% { opacity: 1; } 27.9% { opacity: 0.5; } 28.7%,32% { opacity: 1; } 38% { opacity: 0; } 82% { opacity: 0; } 86% { opacity: 1; } 88.6% { opacity: 0.5; } 90.2% { opacity: 0; } 91.8% { opacity: 1; } 92.7% { opacity: 0; } 93.5% { opacity: 1; } 96.8% { opacity: 0; } 97.6% { opacity: 1; } 99.2% { opacity: 0; } 100% { opacity: 1; }
        }

        .circle-14 {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100px;
            height: 100px;
            animation: circle13AnimationSize 4s -0.15s cubic-bezier(1,0,1,1) infinite,
                       circle14AnimationView 4s ease infinite;
        }
        .circle-14::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 1px solid rgba(255,200,200,0.5);
            transform: translate(-50%, -50%);
        }
        .circle-14::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 95px;
            height: 95px;
            border-radius: 50%;
            border: 1px solid rgba(255,200,200,0.3);
            transform: translate(-50%, -50%);
        }
        @keyframes circle14AnimationView {
            /* same as circle13AnimationView but with -0.15s delay, we keep the same keyframes */
            0% { opacity: 1; } 2.5% { opacity: 0.5; } 5.7% { opacity: 1; } 6.6% { opacity: 0.5; } 7.4% { opacity: 1; } 8.2% { opacity: 0.5; } 9.8% { opacity: 1; } 10.7% { opacity: 0.5; } 11.5%,14% { opacity: 1; } 14.8% { opacity: 0.5; } 15.6% { opacity: 1; } 18% { opacity: 0.5; } 18.9% { opacity: 1; } 20.5% { opacity: 0.5; } 21.3% { opacity: 1; } 22.1% { opacity: 0.5; } 23.8% { opacity: 1; } 24.6% { opacity: 0.5; } 25.4% { opacity: 1; } 27.9% { opacity: 0.5; } 28.7%,32% { opacity: 1; } 38% { opacity: 0; } 82% { opacity: 0; } 86% { opacity: 1; } 88.6% { opacity: 0.5; } 90.2% { opacity: 0; } 91.8% { opacity: 1; } 92.7% { opacity: 0; } 93.5% { opacity: 1; } 96.8% { opacity: 0; } 97.6% { opacity: 1; } 99.2% { opacity: 0; } 100% { opacity: 1; }
        }

        /* --- GLITCH PARTICLES --- */
        .glitch {
            position: absolute;
            top: 50%;
            left: 50%;

            content: '';

            height: 6px;

        /* ===== INTRO SCREEN ===== */
        #intro-screen {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #12081a, #07020a);
            padding: 30px;
            transition: opacity 1.2s ease, visibility 1.2s ease;
            opacity: 1;
            visibility: visible;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            overflow-y: auto;
        }
        #intro-screen.fade-out { opacity: 0; visibility: hidden; pointer-events: none; }

        #intro-text {
            max-width: 750px;
            width: 100%;
            text-align: left;
            font-size: clamp(1.4rem, 4vw, 2.4rem);
            font-weight: 300;
            color: #e4d5ff;
            text-shadow: 0 0 20px #6a2faf;
            line-height: 1.8;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
            z-index: 2;
            position: relative;
        }
        #intro-text .line { opacity: 0; transform: translateY(8px); animation: lineFadeIn 0.3s forwards; }
        @keyframes lineFadeIn { to { opacity: 1; transform: translateY(0); } }
        .cursor-blink {
            display: inline-block;
            width: 3px;
            height: 1.2em;
            background: #9b6dff;
            margin-left: 4px;
            vertical-align: text-bottom;
            animation: blink 0.7s step-end infinite;
        }
        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
        #click-prompt {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #b396d9;
            letter-spacing: 4px;
            opacity: 0;
            display: none;
            font-family: 'Segoe UI', sans-serif;
            z-index: 2;
            position: relative;
        }
        #click-prompt.show {
            display: block;
            animation: fadeInPrompt 0.8s forwards, pulseGlow 1.5s ease-in-out infinite;
        }
        @keyframes fadeInPrompt { to { opacity: 1; } }
        @keyframes pulseGlow {
            0%,100% { text-shadow: 0 0 10px #6a2faf; }
            50% { text-shadow: 0 0 30px #9b6dff, 0 0 60px #4a1a7a; }
        }

        /* ===== MAIN APP ===== */
        #main-app {
            opacity: 0;
            transition: opacity 1.5s ease;
            width: 100%;
            max-width: 700px;
            pointer-events: none;
            max-height: 90vh;
            overflow-y: auto;
            padding: 5px;
            position: relative;
            z-index: 2;
        }
        #main-app.visible { opacity: 1; pointer-events: all; }

        .container {
            background: rgba(20, 10, 30, 0.5);
            backdrop-filter: blur(12px) saturate(1.2);
            -webkit-backdrop-filter: blur(12px) saturate(1.2);
            border: 1px solid rgba(180, 130, 255, 0.25);
            border-radius: 40px;
            padding: 50px 40px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 60px rgba(100, 40, 180, 0.2), inset 0 0 30px rgba(150, 100, 220, 0.05);
            position: relative;
            overflow: hidden;
        }

        .logo-wrapper {
            position: relative;
            display: block;
            width: 100%;
            margin: 0 auto 15px auto;
            z-index: 2;
            padding: 0;
            background: transparent;
        }

        .logo-wrapper::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 95%;
            height: 95%;
            background: radial-gradient(circle at center, rgba(123, 46, 255, 0.12), rgba(75, 26, 120, 0.08) 40%, transparent 70%);
            border-radius: 50%;
            animation: breathGlow 3s ease-in-out infinite alternate;
            z-index: 0;
            pointer-events: none;
        }
        @keyframes breathGlow {
            0% { opacity: 0.4; transform: translate(-50%, -50%) scale(0.85); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
        }

        .guild-logo {
            display: block;
            width: 100%;
            height: auto;
            object-fit: contain;
            position: relative;
            z-index: 2;
            background: #32104F;
            filter: drop-shadow(0 0 30px rgba(123, 46, 255, 0.2));
        }

        .sub-title {
            font-size: 1rem;
            color: #b396d9;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 30px;
            border-top: 1px solid rgba(150, 100, 220, 0.2);
            border-bottom: 1px solid rgba(150, 100, 220, 0.2);
            display: inline-block;
            padding: 8px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 30px;
            position: relative;
            z-index: 3;
        }

        .result-wrapper {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 30px;
            border: 1px solid rgba(150, 100, 220, 0.2);
            padding: 25px 20px 15px 20px;
            margin-bottom: 15px;
            transition: 0.3s;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            z-index: 3;
        }
        .result-wrapper:hover { border-color: #9b6dff; box-shadow: 0 0 30px rgba(100, 40, 200, 0.2); }
        .result-wrapper:active { transform: scale(0.98); }

        #result {
            font-size: clamp(2.2rem, 7vw, 4rem);
            font-weight: 400;
            color: #f2e9ff;
            text-shadow: 0 0 40px #9b6dff, 0 0 80px #4a1a7a;
            letter-spacing: 2px;
            word-break: break-word;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            transition: 0.3s;
        }
        #result.placeholder {
            font-size: 1.1rem;
            color: #6a4a8a;
            text-shadow: none;
            letter-spacing: 4px;
            font-weight: 300;
        }

        .result-message {
            font-size: 0.85rem;
            color: #b396d9;
            margin-top: 8px;
            opacity: 0;
            transition: opacity 0.5s ease;
            letter-spacing: 2px;
            font-family: 'Segoe UI', sans-serif;
        }
        .result-message.show { opacity: 1; }

        .copy-hint {
            font-size: 0.75rem;
            color: #7a5a9a;
            letter-spacing: 2px;
            margin-top: 8px;
            pointer-events: none;
        }

        .copy-btn-container {
            margin: 10px 0 20px 0;
            position: relative;
            z-index: 3;
        }
        .copy-btn {
            background: rgba(100, 40, 180, 0.25);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(150, 100, 220, 0.3);
            color: #c4a8f0;
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 2px;
            display: inline-block;
            -webkit-tap-highlight-color: transparent;
        }
        .copy-btn:hover { background: rgba(100, 40, 180, 0.4); border-color: #9b6dff; box-shadow: 0 0 20px rgba(100, 40, 200, 0.2); }
        .copy-btn:active { transform: scale(0.95); }

        .random-section {
            margin: 20px 0 15px 0;
            position: relative;
            z-index: 3;
        }
        .random-btn {
            background: rgba(100, 40, 180, 0.15);
            border: 1px solid rgba(150, 100, 220, 0.2);
            color: #c4a8f0;
            padding: 8px 25px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 2px;
            display: inline-block;
            -webkit-tap-highlight-color: transparent;
        }
        .random-btn:hover { background: rgba(100, 40, 180, 0.3); border-color: #9b6dff; box-shadow: 0 0 20px rgba(100, 40, 200, 0.15); }
        .random-btn:active { transform: scale(0.95); }

        .gender-select {
            display: none;
            margin-top: 12px;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .gender-select.open { display: flex; }

        .gender-btn {
            background: rgba(100, 40, 180, 0.15);
            border: 1px solid rgba(150, 100, 220, 0.25);
            color: #c4a8f0;
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 2px;
            -webkit-tap-highlight-color: transparent;
        }
        .gender-btn:hover { background: rgba(100, 40, 180, 0.3); border-color: #9b6dff; box-shadow: 0 0 20px rgba(100, 40, 200, 0.15); }

    <script>
        // =============================================
        // 0. RIPPLE CURSOR EFFECT (kept)
        // =============================================
        const rippleContainer = document.getElementById('ripple-container');

        function createRipple(x, y, isClick = false) {
            const el = document.createElement('div');
            el.className = `ripple${isClick ? ' click' : ''}`;
            const size = isClick ? 80 + Math.random() * 40 : 30 + Math.random() * 30;
            el.style.width = size + 'px';
            el.style.height = size + 'px';
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            if (isClick) {
                el.style.background = 'radial-gradient(circle, rgba(123,46,255,0.8), rgba(155,109,255,0.4), transparent 70%)';
                el.style.boxShadow = '0 0 40px rgba(123,46,255,0.7), 0 0 100px rgba(75,26,120,0.4)';
                el.style.animation = 'rippleClick 1s ease-out forwards';
            } else {
                el.style.background = 'radial-gradient(circle, rgba(123,46,255,0.5), rgba(75,26,120,0.25), transparent 70%)';
                el.style.boxShadow = '0 0 20px rgba(123,46,255,0.4), 0 0 60px rgba(75,26,120,0.2)';
                el.style.animation = 'rippleFade 1.2s ease-out forwards';
            }
            rippleContainer.appendChild(el);
            setTimeout(() => {
                if (el && el.parentNode) el.remove();
            }, 1500);
        }

        let rippleThrottle = false;
        document.addEventListener('mousemove', function(e) {
            if (rippleThrottle) return;
            rippleThrottle = true;
            requestAnimationFrame(() => {
                createRipple(e.clientX, e.clientY, false);
                rippleThrottle = false;
            });
        });

        document.addEventListener('touchmove', function(e) {
            const touch = e.touches[0];
            if (touch) {
                requestAnimationFrame(() => {
                    createRipple(touch.clientX, touch.clientY, false);
                });
            }
        }, { passive: true });

        document.addEventListener('click', function(e) {
            createRipple(e.clientX, e.clientY, true);
        });

        document.addEventListener('touchstart', function(e) {
            const touch = e.touches[0];
            if (touch) {
                createRipple(touch.clientX, touch.clientY, true);
            }
        }, { passive: true });

        // =============================================
        // 1. AUDIO PRELOAD & CONTEXT
        // =============================================
        const audio = document.getElementById('bg-music');
        audio.volume = 0.25;
        audio.preload = 'auto';
        audio.load();

        let audioCtx = null;
        let audioCtxResumed = false;

        function resumeAudioContext() {
            if (audioCtxResumed) return;
            try {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume().then(() => {
                        audioCtxResumed = true;
                        console.log('🔊 AudioContext resumed');
                    }).catch(e => console.log('⛔ Resume failed:', e));
                } else {
                    audioCtxResumed = true;
                }
            } catch (e) {}
        }
        document.addEventListener('click', resumeAudioContext);
        document.addEventListener('touchstart', resumeAudioContext);
        document.addEventListener('keydown', resumeAudioContext);

        // =============================================
        // 2. TYPING INTRO
        // =============================================
        const introLines = [
            "Welcome to Phantom ・〆 Guild name generator.",
            "Here, you get your official Phantom name signature and text style.",
            "Just type your name below and see it transform.",
            "Tap the result to copy it."
        ];
        const introContainer = document.getElementById('intro-text');
        const introScreen = document.getElementById('intro-screen');
        const mainApp = document.getElementById('main-app');
        const clickPrompt = document.getElementById('click-prompt');
        let lineIndex = 0;
        let introComplete = false;

        function playKeyboardClick() {
            try {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume().catch(() => {});
                }
                if (audioCtx.state !== 'running') return;
                const now = audioCtx.currentTime;
                const bufferSize = audioCtx.sampleRate * 0.04;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.3));
                }
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
                noise.connect(gain);
                gain.connect(audioCtx.destination);
                noise.start(now);
                noise.stop(now + 0.06);
                const osc = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc.frequency.value = 1800 + Math.random() * 600;
                osc.type = 'square';
                gain2.gain.setValueAtTime(0.04, now);
                gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.02);
                osc.start(now);
                osc.stop(now + 0.02);
            } catch (e) {}
        }

        function typeLine() {
            if (lineIndex >= introLines.length) {
                introComplete = true;
                clickPrompt.classList.add('show');
                return;
            }
            const currentLine = introLines[lineIndex];
            const lineElement = document.createElement('div');
            lineElement.className = 'line';
            introContainer.appendChild(lineElement);
            let currentChar = 0;

            function typeChar() {
                if (currentChar < currentLine.length) {
                    const char = currentLine[currentChar];
                    lineElement.textContent += char;
                    if (char === ' ') {
                        try {
                            if (audioCtx && audioCtx.state === 'running') {
                                const now = audioCtx.currentTime;
                                const osc = audioCtx.createOscillator();
                                const gain = audioCtx.createGain();
                                osc.connect(gain);
                                gain.connect(audioCtx.destination);
                                osc.frequency.value = 300 + Math.random() * 200;
                                osc.type = 'sine';
                                gain.gain.setValueAtTime(0.02, now);
                                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
                                osc.start(now);
                                osc.stop(now + 0.03);
                            }
                        } catch (e) {}
                    } else {
                        playKeyboardClick();
                    }
                    currentChar++;
                    setTimeout(typeChar, 45);
                } else {
                    const cursor = document.createElement('span');
                    cursor.className = 'cursor-blink';
                    lineElement.appendChild(cursor);
                    lineIndex++;
                    setTimeout(typeLine, 300);
                }
            }
            typeChar();
        }
        window.addEventListener('load', typeLine);

        // =============================================
        // 3. MUSIC
        // =============================================
        let musicStarted = false;

        function playMusic() {
            if (musicStarted) return;
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    musicStarted = true;
                    console.log('🔊 Aurora playing at 25% volume');
                }).catch(err => {
                    console.log('⛔ Play blocked:', err.message);
                });
            }
        }

        introScreen.addEventListener('click', function(e) {
            if (introComplete) {
                introScreen.classList.add('fade-out');
                mainApp.classList.add('visible');
                playMusic();
            }
        });
        introScreen.addEventListener('touchstart', function(e) {
            if (introComplete) {
                introScreen.classList.add('fade-out');
                mainApp.classList.add('visible');
                playMusic();
            }
        }, { passive: true });

        document.addEventListener('click', function() {
            if (introComplete && !musicStarted) {
                playMusic();
            }
        });

        audio.addEventListener('ended', () => {
            audio.play().catch(() => {});
        });

        // =============================================
        // 4. NAME GENERATOR
        // =============================================
        const smallCapsMap = {
            'a': 'ᴀ', 'b': 'ʙ', 'c': 'ᴄ', 'd': 'ᴅ', 'e': 'ᴇ',
            'f': 'ꜰ', 'g': 'ɢ', 'h': 'ʜ', 'i': 'ɪ', 'j': 'ᴊ',
            'k': 'ᴋ', 'l': 'ʟ', 'm': 'ᴍ', 'n': 'ɴ', 'o': 'ᴏ',
            'p': 'ᴘ', 'q': 'ǫ', 'r': 'ʀ', 's': 'ꜱ', 't': 'ᴛ',
            'u': 'ᴜ', 'v': 'ᴠ', 'w': 'ᴡ', 'x': 'x', 'y': 'ʏ', 'z': 'ᴢ'
        };
        let currentGeneratedName = '';

        function updatePreview() {
            const inputField = document.getElementById('userName');
            const resultDisplay = document.getElementById('result');
            const resultMessage = document.getElementById('resultMessage');
            let rawName = inputField.value.trim();
            if (rawName === '') {
                resultDisplay.textContent = '✦ Type your name below ✦';
                resultDisplay.className = 'placeholder';
                currentGeneratedName = '';
                resultMessage.textContent = '';
                resultMessage.className = 'result-message';
                return;
            }
            const smallName = rawName.toLowerCase().split('').map(ch => smallCapsMap[ch] || ch).join('');
            const phantomIdentity = smallName + '・〆';
            currentGeneratedName = phantomIdentity;
            resultDisplay.textContent = phantomIdentity;
            resultDisplay.className = '';
            resultDisplay.style.color = '#f2e9ff';
            resultDisplay.style.textShadow = '0 0 40px #9b6dff, 0 0 80px #4a1a7a';
            resultMessage.textContent = 'Now go and meet Huios, the Guild Leader.';
            resultMessage.className = 'result-message show';
        }
        document.getElementById('doneBtn').addEventListener('click', function() {
            updatePreview();
            const resultDisplay = document.getElementById('result');
            if (currentGeneratedName) {
                resultDisplay.style.transition = '0.1s';
                resultDisplay.style.textShadow = '0 0 80px #ff66ff, 0 0 160px #9b6dff';
                setTimeout(() => {
                    resultDisplay.style.textShadow = '0 0 40px #9b6dff, 0 0 80px #4a1a7a';
                }, 300);
            }
        });

        // =============================================
        // 5. COPY
        // =============================================
        function copyResult() {
            const resultDisplay = document.getElementById('result');
            const textToCopy = currentGeneratedName;
            if (!textToCopy || resultDisplay.className === 'placeholder') {
                resultDisplay.textContent = '⚠️ TYPE A NAME FIRST!';
                resultDisplay.style.color = '#ff8888';
                resultDisplay.style.textShadow = '0 0 30px #ff2222';
                setTimeout(() => {
                    if (document.getElementById('userName').value.trim() === '') {
                        resultDisplay.textContent = '✦ Type your name below ✦';
                        resultDisplay.className = 'placeholder';
                    } else { updatePreview(); }
                }, 1500);
                return;
            }
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(textToCopy).then(() => showCopiedFeedback(resultDisplay))
                    .catch(() => fallbackCopyText(textToCopy, resultDisplay));
            } else {
                fallbackCopyText(textToCopy, resultDisplay);
            }
        }

        function fallbackCopyText(text, resultDisplay) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.left = '0';
            textarea.style.top = '0';
            textarea.style.width = '1px';
            textarea.style.height = '1px';
            textarea.style.opacity = '0.5';
            textarea.style.zIndex = '9999';
            textarea.style.pointerEvents = 'none';
            textarea.setAttribute('readonly', '');
            document.body.appendChild(textarea);
            setTimeout(() => {
                textarea.focus();
                textarea.select();
                textarea.setSelectionRange(0, text.length);
                try {
                    const success = document.execCommand('copy');
                    if (success) { showCopiedFeedback(resultDisplay); } else { showCopiedFeedback(resultDisplay); }
                } catch (e) { showCopiedFeedback(resultDisplay); }
                document.body.removeChild(textarea);
            }, 50);
        }

        function showCopiedFeedback(resultDisplay) {
            resultDisplay.textContent = '✅  COPIED!  ✅';
            resultDisplay.style.color = '#b3ff9b';
            resultDisplay.style.textShadow = '0 0 40px #66ff33';
            setTimeout(() => {
                if (currentGeneratedName) {
                    resultDisplay.textContent = currentGeneratedName;
                    resultDisplay.style.color = '#f2e9ff';
                    resultDisplay.style.textShadow = '0 0 40px #9b6dff, 0 0 80px #4a1a7a';
                }
            }, 1500);
        }

        let currentGender = null;
        let usedIndices = [];

        function getRandomNamesFromArray(arr, count) {
            const available = arr.filter((_, idx) => !usedIndices.includes(idx));
            if (available.length === 0) return [];
            const shuffled = [...available].sort(() => Math.random() - 0.5);
            const selected = shuffled.slice(0, Math.min(count, shuffled.length));
            selected.forEach(name => {
                const idx = arr.indexOf(name);
                if (idx !== -1 && !usedIndices.includes(idx)) usedIndices.push(idx);
            });
            return selected;
        }

        function renderNameList(names) {
            const listContainer = document.getElementById('nameList');
            const noMoreMsg = document.getElementById('noMoreNames');
            listContainer.innerHTML = '';
            if (names.length === 0) { noMoreMsg.style.display = 'block'; return; }
            noMoreMsg.style.display = 'none';
            names.forEach(name => {
                const item = document.createElement('div');
                item.className = 'name-list-item';
                item.textContent = name;
                item.addEventListener('click', function() {
                    document.getElementById('userName').value = name;
                    updatePreview();
                    document.getElementById('doneBtn').click();
                    document.getElementById('nameListContainer').classList.remove('open');
                    document.getElementById('randomToggleBtn').textContent = '🎲 Random Name';
                    document.getElementById('genderSelect').classList.remove('open');
                });
                listContainer.appendChild(item);
            });
        }

        function loadMoreNames() {
            if (!currentGender) return;
            const nameArray = currentGender === 'male' ? maleNames : femaleNames;
            const remaining = nameArray.filter((_, idx) => !usedIndices.includes(idx));
            if (remaining.length === 0) {
                document.getElementById('noMoreNames').style.display = 'block';
                document.getElementById('generateMoreBtn').style.display = 'none';
                return;
            }
            const newNames = getRandomNamesFromArray(nameArray, 7);
            if (newNames.length === 0) {
                document.getElementById('noMoreNames').style.display = 'block';
                document.getElementById('generateMoreBtn').style.display = 'none';
                return;
            }
            renderNameList(newNames);
            const remainingAfter = nameArray.filter((_, idx) => !usedIndices.includes(idx));
            if (remainingAfter.length === 0) {
                document.getElementById('noMoreNames').style.display = 'block';
                document.getElementById('generateMoreBtn').style.display = 'none';
            } else {
                document.getElementById('noMoreNames').style.display = 'none';
                document.getElementById('generateMoreBtn').style.display = 'inline-block';
            }
        }

        document.getElementById('randomToggleBtn').addEventListener('click', function() {
            const genderSelect = document.getElementById('genderSelect');
            const container = document.getElementById('nameListContainer');
            const isOpen = genderSelect.classList.contains('open');
            if (isOpen) {
                genderSelect.classList.remove('open');
                container.classList.remove('open');
                this.textContent = '🎲 Random Name';
                currentGender = null;
                usedIndices = [];
                document.getElementById('noMoreNames').style.display = 'none';
                document.getElementById('generateMoreBtn').style.display = 'inline-block';
                document.getElementById('nameList').innerHTML = '';
            } else {
                genderSelect.classList.add('open');
                container.classList.remove('open');
                this.textContent = '🎲 Random Name (select gender)';
            }
