<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ᴘʜᴀɴᴛᴏᴍ・〆 — Name Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #12081a, #07020a);
            font-family: 'Segoe UI', 'Arial', sans-serif;
            padding: 20px;
        }

        .container {
            background: rgba(20, 10, 30, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(180, 130, 255, 0.2);
            border-radius: 40px;
            padding: 50px 40px;
            max-width: 650px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 60px rgba(100, 40, 180, 0.3);
            transition: all 0.3s ease;
        }

        .guild-title {
            font-size: clamp(2.8rem, 10vw, 4.5rem);
            font-weight: 400;
            letter-spacing: 4px;
            color: #e4d5ff;
            text-shadow: 0 0 30px #8a4bff, 0 0 60px #4a1a7a;
            margin-bottom: 5px;
            word-break: break-word;
        }

        .sub-title {
            font-size: 1rem;
            color: #b396d9;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 40px;
            border-top: 1px solid rgba(150, 100, 220, 0.2);
            border-bottom: 1px solid rgba(150, 100, 220, 0.2);
            display: inline-block;
            padding: 8px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 30px;
        }

        .input-area {
            margin: 30px 0 20px;
        }

        .input-area label {
            display: block;
            font-size: 0.9rem;
            color: #b396d9;
            letter-spacing: 3px;
            margin-bottom: 12px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .input-area input {
            width: 100%;
            padding: 18px 25px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(150, 100, 220, 0.3);
            border-radius: 60px;
            font-size: 1.2rem;
            color: #f0eaff;
            text-align: center;
            letter-spacing: 2px;
            outline: none;
            transition: 0.3s;
            font-weight: 300;
        }

        .input-area input::placeholder {
            color: #6a4a8a;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        .input-area input:focus {
            border-color: #9b6dff;
            box-shadow: 0 0 25px rgba(120, 60, 220, 0.3);
            background: rgba(10, 5, 20, 0.7);
        }

        .btn {
            margin-top: 25px;
            padding: 16px 55px;
            background: linear-gradient(135deg, #6c2bb3, #3b1470);
            border: none;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 6px;
            color: #f5ecff;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 30px rgba(100, 40, 200, 0.3);
            text-transform: uppercase;
        }

        .btn:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #8235d9, #4f1d8a);
            box-shadow: 0 0 50px rgba(130, 50, 220, 0.6);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .result-area {
            margin-top: 40px;
            min-height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            border: 1px dashed rgba(150, 100, 220, 0.2);
            padding: 20px;
        }

        #result {
            font-size: clamp(1.8rem, 6vw, 3.5rem);
            font-weight: 400;
            color: #f2e9ff;
            text-shadow: 0 0 40px #9b6dff, 0 0 80px #4a1a7a;
            letter-spacing: 2px;
            word-break: break-word;
            transition: 0.3s;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }

        #result.placeholder {
            font-size: 1rem;
            color: #6a4a8a;
            text-shadow: none;
            letter-spacing: 4px;
        }

        .footer-note {
            margin-top: 25px;
            font-size: 0.7rem;
            color: #3f2a5a;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* small caps fallback */
        .small-caps {
            font-variant: small-caps;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            .btn {
                padding: 14px 30px;
                font-size: 1rem;
                letter-spacing: 4px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Guild Title in your exact format -->
        <h1 class="guild-title">ᴘʜᴀɴᴛᴏᴍ・〆</h1>
        <div class="sub-title">Name Generator</div>

        <div class="input-area">
            <label for="userName">Enter your name</label>
            <input type="text" id="userName" placeholder="e.g. Raven" autofocus>
        </div>

        <button class="btn" onclick="generateName()">D O N E ?</button>

        <div class="result-area">
            <div id="result" class="placeholder">✦ Your phantom identity awaits ✦</div>
        </div>
        <div class="footer-note">ᴄʜᴀɴɴᴇʟ ᴛʜᴇ ᴠᴏɪᴅ</div>
    </div>

    <script>
        // Complete small-caps Unicode mapping (A-Z)
        const smallCapsMap = {
            'a': 'ᴀ', 'b': 'ʙ', 'c': 'ᴄ', 'd': 'ᴅ', 'e': 'ᴇ', 
            'f': 'ꜰ', 'g': 'ɢ', 'h': 'ʜ', 'i': 'ɪ', 'j': 'ᴊ', 
            'k': 'ᴋ', 'l': 'ʟ', 'm': 'ᴍ', 'n': 'ɴ', 'o': 'ᴏ', 
            'p': 'ᴘ', 'q': 'ǫ', 'r': 'ʀ', 's': 'ꜱ', 't': 'ᴛ', 
            'u': 'ᴜ', 'v': 'ᴠ', 'w': 'ᴡ', 'x': 'x', 'y': 'ʏ', 'z': 'ᴢ'
        };

        function generateName() {
            const inputField = document.getElementById('userName');
            const resultDisplay = document.getElementById('result');
            let rawName = inputField.value.trim();

            // If input is empty, show a warning and reset styling
            if (rawName === '') {
                resultDisplay.textContent = '⚠️ PLEASE ENTER A NAME FIRST';
                resultDisplay.style.color = '#b396d9';
                resultDisplay.style.textShadow = '0 0 20px #7b2fbe';
                return;
            }

            // Convert to lowercase, then map each character to small-caps
            const smallName = rawName
                .toLowerCase()
                .split('')
                .map(char => smallCapsMap[char] || char) // keep non-letters as-is
                .join('');

            // Append the guild suffix
            const phantomIdentity = smallName + '・〆';

            // Display the result with full Phantom styling
            resultDisplay.textContent = phantomIdentity;
            resultDisplay.style.color = '#f2e9ff';
            resultDisplay.style.textShadow = '0 0 40px #9b6dff, 0 0 80px #4a1a7a';
        }

        // Allow pressing "Enter" in the input field to trigger generation
        document.getElementById('userName').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                generateName();
            }
        });
    </script>
</body>
</html>
